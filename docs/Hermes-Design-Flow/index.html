<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Agent 技术导览</title>
<script src="assets/marked.min.js"></script>
<script src="assets/mermaid.min.js"></script>
<script src="content.js"></script>
<style>
  :root{
    --bg:#f5f7fb;
    --surface:#fff;
    --ink:#1c2330;
    --ink-soft:#5a6473;
    --ink-faint:#9aa3b2;
    --line:#e6e9ef;
    --line-soft:#eef1f5;
    --brand:#2563eb;
    --brand-soft:#eaf1ff;
    --code-bg:#f4f6f9;
    --p1:#2563eb; --p1bg:#eaf1ff;
    --p2:#7c3aed; --p2bg:#f1ecfe;
    --p3:#059669; --p3bg:#e3f7ef;
    --p4:#d97706; --p4bg:#fdf2dc;
    --p5:#dc2626; --p5bg:#fdeaea;
    --p6:#0891b2; --p6bg:#e0f7fb;
    --topbar-h:58px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.72;font-size:15.5px;-webkit-font-smoothing:antialiased;
  }
  body::before{
    content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:
      radial-gradient(620px 420px at 12% -4%, rgba(37,99,235,.10), transparent 60%),
      radial-gradient(680px 460px at 92% 2%, rgba(124,58,237,.10), transparent 60%),
      radial-gradient(720px 520px at 70% 105%, rgba(5,150,105,.08), transparent 60%);
  }
  a{color:var(--brand);text-decoration:none}
  .topbar{
    position:sticky;top:0;z-index:50;height:var(--topbar-h);
    background:rgba(255,255,255,.84);backdrop-filter:saturate(180%) blur(12px);
    border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:0 18px;
  }
  .brand{display:flex;align-items:center;gap:9px;border:0;background:none;padding:0;font:inherit;font-weight:750;font-size:15px;white-space:nowrap;cursor:pointer;color:var(--ink)}
  .brand .dot{width:13px;height:13px;border-radius:4px;background:linear-gradient(135deg,var(--p1),var(--p2),var(--p3));background-size:200% 200%;animation:dotShift 6s ease infinite}
  @keyframes dotShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
  .nav{display:flex;align-items:center;gap:3px;overflow-x:auto;flex:1;scrollbar-width:thin}
  .chip{display:inline-flex;align-items:center;gap:5px;padding:6px 10px;border-radius:8px;white-space:nowrap;font:inherit;font-size:13px;color:var(--ink-soft);cursor:pointer;border:1px solid transparent;background:none;transition:all .15s}
  .chip:hover{background:var(--line-soft);color:var(--ink);transform:translateY(-1px)}
  .chip.active{background:var(--brand-soft);color:var(--brand);border-color:#d3e2ff;font-weight:650}
  .brand:focus-visible,.chip:focus-visible,.card:focus-visible,.flow-node:focus-visible,.foot-btn:focus-visible,.code-anchor:focus-visible{outline:2px solid var(--brand);outline-offset:2px}
  .source-badge{display:inline-flex;align-items:center;gap:6px;flex:none;padding:5px 8px;border:1px solid var(--line);border-radius:7px;background:rgba(255,255,255,.72);color:var(--ink-soft);font-size:11px;white-space:nowrap}
  .source-badge code{padding:0;background:none;color:var(--ink);font-size:11px}
  .source-badge.dirty::after{content:"dirty";color:var(--p5);font-weight:750}
  .lang-toggle{display:inline-flex;flex:none;border:1px solid var(--line);border-radius:7px;overflow:hidden;background:#fff}
  .lang-btn{border:0;background:transparent;padding:5px 8px;font:inherit;font-size:11px;color:var(--ink-soft);cursor:pointer}
  .lang-btn.active{background:var(--brand-soft);color:var(--brand);font-weight:750}
  .readbar{position:fixed;top:var(--topbar-h);left:0;height:3px;width:0;z-index:49;background:linear-gradient(90deg,var(--p1),var(--p2),var(--p3));transition:width .08s linear;opacity:0}
  .readbar.show{opacity:1}

  .layout{display:grid;grid-template-columns:272px minmax(0,1fr);max-width:1760px;margin:0 auto;padding:0 24px}
  .layout.home{grid-template-columns:minmax(0,1fr)}
  .layout.home .toc{display:none}
  .toc{position:sticky;top:var(--topbar-h);align-self:start;height:calc(100vh - var(--topbar-h));overflow-y:auto;padding:26px 14px 60px 22px;border-right:1px solid var(--line)}
  .toc-title{font-size:11px;font-weight:750;letter-spacing:.09em;color:var(--ink-faint);text-transform:uppercase;margin-bottom:12px}
  .toc a{display:block;color:var(--ink-soft);font-size:13.5px;padding:5px 10px;border-radius:7px;margin:1px 0;border-left:2px solid transparent;line-height:1.45;transition:all .13s}
  .toc a:hover{background:var(--line-soft);color:var(--ink)}
  .toc a.h3{padding-left:22px;font-size:12.8px;color:var(--ink-faint)}
  .toc a.active{color:var(--brand);background:var(--brand-soft);font-weight:650;border-left-color:var(--brand);transform:translateX(2px)}
  .main{min-width:0;padding:34px 46px 120px}
  .doc{max-width:1180px;margin:0 auto;animation:fadeUp .35s ease both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .doc h1{font-size:27px;line-height:1.35;margin:.2em 0 .6em;font-weight:800}
  .doc h2{font-size:21px;margin:2em 0 .7em;padding-top:.5em;font-weight:730;border-top:1px solid var(--line-soft);scroll-margin-top:74px}
  .doc h2:first-of-type{border-top:none}
  .doc h3{font-size:16.5px;margin:1.5em 0 .5em;font-weight:730;color:#2a3342;scroll-margin-top:74px}
  .doc p{margin:.7em 0}
  .doc ul,.doc ol{padding-left:1.4em;margin:.6em 0}
  .doc li{margin:.32em 0}
  .doc strong{color:#101725;font-weight:750}
  .doc blockquote{margin:1.1em 0;padding:.6em 1.1em;background:var(--brand-soft);border-left:3px solid var(--brand);border-radius:0 8px 8px 0;color:#243043}
  .doc code{background:var(--code-bg);padding:.12em .42em;border-radius:5px;font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace;font-size:.88em;color:#b3406b}
  .doc pre{background:#f4f6f9;border:1px solid var(--line);padding:14px 16px;border-radius:10px;overflow-x:auto;margin:1em 0;line-height:1.55}
  .doc pre code{background:none;padding:0;color:#2a3342;font-size:13px}
  .doc .mermaid{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px;margin:1em 0;overflow-x:auto;text-align:center}
  .doc .mermaid svg{max-width:100%;height:auto}
  .doc table{border-collapse:collapse;width:100%;margin:1.1em 0;font-size:14px;display:block;overflow-x:auto}
  .doc th,.doc td{border:1px solid var(--line);padding:8px 12px;text-align:left;vertical-align:top}
  .doc th{background:var(--line-soft);font-weight:750}
  .doc tr:nth-child(even) td{background:#fafbfc}
  .doc hr{border:none;border-top:1px solid var(--line);margin:2em 0}

  .hero{display:flex;align-items:center;gap:30px;flex-wrap:wrap;margin-bottom:12px}
  .hero-text{flex:1;min-width:300px}
  .hero h1{font-size:36px;font-weight:850;letter-spacing:-.01em;margin:.1em 0 .3em;background:linear-gradient(100deg,#1c2330 30%,#2563eb 56%,#7c3aed 76%,#1c2330 96%);background-size:220% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:sheen 8s ease infinite}
  @keyframes sheen{0%,100%{background-position:0% 0}50%{background-position:100% 0}}
  .hero p{font-size:16px;color:var(--ink-soft);max-width:760px;margin:.3em 0}
  .hero .sub{font-size:14px;color:var(--ink-faint)}
  .source-meta{font-size:13px!important;color:var(--ink-soft)!important}
  .source-link code{font-size:.92em;color:inherit;word-break:break-all}
  .source-dirty{margin-left:6px;color:var(--p5);font-weight:750}
  .visual-panel{margin:28px 0 18px;background:var(--surface);border:1px solid var(--line);border-radius:8px;overflow:hidden;box-shadow:0 14px 36px rgba(28,35,48,.07)}
  .visual-head{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;padding:18px 20px;border-bottom:1px solid var(--line-soft);background:linear-gradient(110deg,#fff,var(--accentBg,#eaf1ff))}
  .visual-kicker{font-size:12px;font-weight:780;color:var(--accent,var(--brand));letter-spacing:.02em}
  .visual-title{font-size:20px;font-weight:820;margin-top:2px}
  .visual-copy{font-size:13px;color:var(--ink-soft);max-width:700px;margin-top:4px;line-height:1.55}
  .visual-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
  .visual-action{border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 10px;font-size:12px;color:var(--ink-soft);cursor:pointer;transition:all .15s;white-space:nowrap}
  .visual-action:hover,.visual-action.active{border-color:var(--accent,var(--brand));background:var(--accentBg,#eaf1ff);color:var(--accent,var(--brand))}
  .visual-body{display:grid;grid-template-columns:minmax(0,1fr) 270px;gap:0;min-height:390px}
  .arch-canvas{position:relative;min-height:390px;padding:20px;background:linear-gradient(180deg,#fbfcff,#f6f8fb)}
  .arch-svg{display:block;width:100%;height:auto;min-height:340px}
  .arch-node{cursor:pointer;outline:none}
  .arch-node rect,.arch-node circle,.arch-node path{transition:filter .16s,stroke-width .16s,transform .16s}
  .arch-node:hover rect,.arch-node:hover circle,.arch-node:focus rect,.arch-node:focus circle{filter:drop-shadow(0 8px 12px rgba(37,99,235,.18));stroke-width:2.4}
  .arch-node.active rect,.arch-node.active circle{stroke:#111827;stroke-width:2.8;filter:drop-shadow(0 10px 16px rgba(28,35,48,.18))}
  .arch-node text{pointer-events:none;font-family:inherit}
  .arch-line{stroke:#cbd5e1;stroke-width:2.2;fill:none;stroke-linecap:round}
  .arch-pulse{stroke-dasharray:8 9;animation:dashMove 2.8s linear infinite}
  @keyframes dashMove{to{stroke-dashoffset:-34}}
  .visual-side{border-left:1px solid var(--line-soft);padding:18px;background:#fff}
  .visual-side-label{font-size:11px;font-weight:780;color:var(--ink-faint);letter-spacing:.08em;text-transform:uppercase}
  .visual-side-title{font-size:18px;font-weight:800;margin:6px 0 8px}
  .visual-side-text{font-size:13.5px;color:var(--ink-soft);line-height:1.65}
  .visual-side-link{display:inline-flex;margin-top:14px;border:1px solid var(--line);border-radius:8px;padding:7px 11px;font-size:12px;font-weight:720;color:var(--accent,var(--brand));background:var(--accentBg,#eaf1ff);cursor:pointer}
  .ring-wrap{display:flex;flex-direction:column;align-items:center;gap:6px}
  .ring{position:relative;width:118px;height:118px}
  .ring svg{transform:rotate(-90deg)}
  .ring .track{fill:none;stroke:var(--line);stroke-width:9}
  .ring .fill{fill:none;stroke:url(#rg);stroke-width:9;stroke-linecap:round;stroke-dasharray:314;stroke-dashoffset:0}
  .ring .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring .ctr b{font-size:27px;font-weight:850;line-height:1}
  .ring .ctr span{font-size:11px;color:var(--ink-faint);margin-top:3px}
  .ring-cap{font-size:12px;color:var(--ink-faint)}
  .flowmap-wrap{margin:26px 0 6px;overflow-x:auto}
  .flowmap{position:relative;display:flex;min-width:1320px;justify-content:space-between;padding:42px 8px 8px}
  .flow-track,.flow-fill{position:absolute;height:3px;border-radius:3px;top:60px;left:29px;right:29px}
  .flow-track{background:var(--line)}
  .flow-fill{background:linear-gradient(90deg,var(--p1),var(--p2),var(--p3));background-size:200% 100%;animation:flow 2.4s linear infinite;box-shadow:0 0 10px rgba(37,99,235,.35)}
  @keyframes flow{0%{background-position:0% 0}100%{background-position:200% 0}}
  .flow-node{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;border:0;background:none;padding:0;font:inherit;color:inherit;cursor:pointer}
  .node-dot{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:850;font-size:14px;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 4px 14px var(--glow);cursor:pointer;transition:transform .18s,box-shadow .18s}
  .flow-node:hover .node-dot{transform:translateY(-4px) scale(1.1);box-shadow:0 9px 22px var(--glow)}
  .node-label{margin-top:9px;font-size:11.5px;color:var(--ink);text-align:center;max-width:74px;line-height:1.3;font-weight:650}
  .node-pop{position:absolute;top:78px;left:50%;transform:translateX(-50%) translateY(6px);width:220px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:11px 13px;box-shadow:0 12px 30px rgba(20,30,50,.13);opacity:0;visibility:hidden;transition:all .16s;z-index:5;pointer-events:none}
  .node-pop::before{content:"";position:absolute;top:-6px;left:50%;transform:translateX(-50%) rotate(45deg);width:10px;height:10px;background:var(--surface);border-left:1px solid var(--line);border-top:1px solid var(--line)}
  .flow-node:hover .node-pop{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}
  .node-pop .pt{display:block;font-size:13px;font-weight:750;margin-bottom:4px}
  .node-pop .pd{display:block;font-size:12px;color:var(--ink-soft);line-height:1.5}
  .phase{margin-top:34px}
  .phase-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .phase-tag{font-size:12px;font-weight:750;padding:3px 11px;border-radius:7px}
  .phase-line{flex:1;height:1px;background:var(--line)}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(228px,1fr));gap:14px}
  .card{position:relative;width:100%;background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:16px 16px 15px;cursor:pointer;text-align:left;font:inherit;color:inherit;transition:transform .16s,box-shadow .16s,border-color .16s;overflow:hidden}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent);transform:scaleY(.55);transition:transform .16s}
  .card:hover::before{transform:scaleY(1)}
  .card:hover{transform:translateY(-4px);box-shadow:0 12px 28px rgba(20,30,50,.10);border-color:var(--accent)}
  .card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
  .card-num{font-size:23px;font-weight:850;color:var(--accent);line-height:1}
  .badge{font-size:10.5px;font-weight:750;padding:2px 8px;border-radius:6px;background:var(--accentBg);color:var(--accent)}
  .card-title{display:block;font-size:16px;margin:0 0 6px;font-weight:750;color:var(--ink)}
  .card-copy{display:block;font-size:13px;color:var(--ink-soft);margin:0;line-height:1.55}
  .home-route{margin:30px 0 14px;padding:22px;background:var(--surface);border:1px solid var(--line);border-radius:10px;box-shadow:0 14px 36px rgba(28,35,48,.06)}
  .home-route-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:18px}
  .home-route-kicker{font-size:11px;font-weight:800;letter-spacing:.09em;color:var(--brand)}
  .home-route-title{font-size:22px;font-weight:830;margin-top:3px}
  .home-route-copy{font-size:13.5px;color:var(--ink-soft);max-width:620px;line-height:1.6}
  .route-steps{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,3.2fr) minmax(0,1fr);gap:12px;align-items:stretch}
  .route-core{position:relative;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;padding:26px 10px 10px;border:2px solid #9fc0f7;border-radius:12px;background:linear-gradient(135deg,#f5f9ff,#fbf8ff)}
  .route-core-label{position:absolute;top:5px;left:12px;font-size:11px;font-weight:820;letter-spacing:.08em;color:var(--brand)}
  .route-step{position:relative;border:1px solid var(--line);border-radius:9px;background:#fff;padding:15px;text-align:left;font:inherit;color:inherit;cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s}
  .route-step:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 9px 22px rgba(20,30,50,.09)}
  .route-step-num{display:block;font-size:22px;font-weight:850;color:var(--accent);line-height:1}
  .route-step-title{display:block;margin-top:9px;font-size:15px;font-weight:780}
  .route-step-copy{display:block;margin-top:5px;font-size:12.5px;line-height:1.5;color:var(--ink-soft)}
  .doc-hero{position:relative;border:1px solid var(--line);border-radius:8px;padding:22px 24px 18px;margin:0 0 14px;overflow:hidden;background:linear-gradient(120deg,var(--accentBg),#fff 72%)}
  .dh-top{display:flex;align-items:center;gap:16px;position:relative;z-index:1}
  .dh-badge{width:54px;height:54px;border-radius:8px;display:grid;place-items:center;font-size:26px;font-weight:850;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 7px 18px var(--glow);flex:none}
  .dh-phase{font-size:12px;font-weight:750;color:var(--accent)}
  .doc h1.dh-title{font-size:25px;font-weight:850;margin:3px 0 0}
  .dh-meta{display:flex;gap:16px;margin-top:13px;font-size:12.5px;color:var(--ink-soft);position:relative;z-index:1;flex-wrap:wrap}
  .code-anchors{margin:18px 0 26px;padding:17px 18px 18px;background:linear-gradient(120deg,#f8fbff,#fff);border:1px solid #dce7f7;border-radius:10px}
  .code-anchors-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:10px}
  .code-anchors-kicker{font-size:11px;letter-spacing:.08em;font-weight:820;color:var(--brand)}
  .code-anchor-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px}
  .code-anchor{display:block;padding:12px 13px;border:1px solid var(--line);border-radius:8px;background:#fff;color:inherit;transition:transform .15s,box-shadow .15s,border-color .15s}
  .code-anchor:hover{border-color:#9fc0f7;box-shadow:0 8px 20px rgba(37,99,235,.09);transform:translateY(-2px)}
  .code-anchor-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .code-anchor-title{font-size:13.5px;font-weight:760;color:var(--ink)}
  .code-anchor-open{font-size:11px;color:var(--brand);white-space:nowrap}
  .code-anchor-range{display:inline-block;margin-top:6px;padding:3px 6px;border-radius:5px;background:var(--code-bg);font:11px/1.35 "SF Mono",ui-monospace,Menlo,Consolas,monospace;color:#a33e68;word-break:break-all}
  .doc-foot{margin-top:50px;padding-top:22px;border-top:1px solid var(--line);display:flex;justify-content:space-between;gap:14px}
  .foot-btn{display:inline-flex;flex-direction:column;gap:2px;padding:12px 18px;border:1px solid var(--line);border-radius:8px;background:var(--surface);min-width:160px;cursor:pointer;font:inherit;text-align:left;transition:all .15s}
  .foot-btn:hover{border-color:var(--brand);box-shadow:0 6px 18px rgba(37,99,235,.10);transform:translateY(-2px)}
  .foot-btn .lbl{font-size:11px;color:var(--ink-faint)}
  .foot-btn .ttl{font-size:14.5px;font-weight:700;color:var(--ink)}
  .foot-btn.next{text-align:right;align-items:flex-end;margin-left:auto}
  .kbd-hint{position:fixed;bottom:16px;right:18px;font-size:12px;color:var(--ink-faint);background:rgba(255,255,255,.82);border:1px solid var(--line);border-radius:8px;padding:6px 10px;backdrop-filter:blur(6px);z-index:40}
  .kbd-hint kbd{background:var(--line-soft);border:1px solid var(--line);border-radius:4px;padding:1px 6px;font-size:11px;font-family:inherit;margin:0 1px}
  @media (max-width: 900px){
    .layout{display:block;padding:0 14px}
    .toc{display:none}
    .main{padding:24px 4px 90px}
    .hero h1{font-size:30px}
    .ring-wrap{display:none}
    .doc h1{font-size:24px}
    .topbar{padding:0 12px}
    .visual-head{display:block}
    .visual-actions{justify-content:flex-start;margin-top:12px}
    .visual-body{grid-template-columns:1fr}
    .visual-side{border-left:none;border-top:1px solid var(--line-soft)}
    .source-badge .source-label{display:none}
    .arch-canvas{overflow-x:auto}
    .arch-svg{min-width:760px}
    .home-route-head{display:block}
    .home-route-copy{margin-top:8px}
    .route-steps{grid-template-columns:1fr}
    .route-core{grid-template-columns:1fr;padding-top:28px}
  }
</style>
</head>
<body>
<div class="topbar">
  <button class="brand" id="brand" type="button" aria-label="返回导览首页"><span class="dot"></span><span id="brand-text">Hermes Agent 技术导览</span></button>
  <div class="nav" id="nav" aria-label="章节导航"></div>
  <div class="lang-toggle" aria-label="Language"><button class="lang-btn" id="lang-zh" type="button">中文</button><button class="lang-btn" id="lang-en" type="button">EN</button></div>
  <a class="source-badge" id="source-badge" target="_blank" rel="noopener noreferrer" aria-label="查看 Hermes 源码基线"><span class="source-label">源码基线</span><code id="source-hash"></code></a>
</div>
<div class="readbar" id="readbar"></div>
<div class="layout">
  <aside class="toc"><div class="toc-title" id="toc-label">本页目录</div><div id="toc"></div></aside>
  <main class="main"><article class="doc" id="doc"></article></main>
</div>
<div class="kbd-hint"><kbd>←</kbd>/<kbd>→</kbd> <span id="kbd-label">切换章节</span></div>

<script>
const site = window.SITE;
if (window.mermaid) {
  mermaid.initialize({
    startOnLoad: false,
    theme: "neutral",
    securityLevel: "loose",
    flowchart: { htmlLabels: true, curve: "basis" },
    sequence: { mirrorActors: false }
  });
}
const colors = [
  ["#2563eb","#7c3aed","#eaf1ff","rgba(37,99,235,.24)"],
  ["#7c3aed","#0891b2","#f1ecfe","rgba(124,58,237,.22)"],
  ["#059669","#2563eb","#e3f7ef","rgba(5,150,105,.22)"],
  ["#d97706","#dc2626","#fdf2dc","rgba(217,119,6,.22)"],
  ["#dc2626","#7c3aed","#fdeaea","rgba(220,38,38,.20)"],
  ["#0891b2","#059669","#e0f7fb","rgba(8,145,178,.22)"]
];
let current = -1;
let language = localStorage.getItem("hermes-design-language") === "en" ? "en" : "zh";
const nav = document.getElementById("nav");
const doc = document.getElementById("doc");
const toc = document.getElementById("toc");
const readbar = document.getElementById("readbar");
const layout = document.querySelector(".layout");
const source = site.source || {};
const sourceBadge = document.getElementById("source-badge");
const sourceHash = document.getElementById("source-hash");
const brandText = document.getElementById("brand-text");
const tocLabel = document.getElementById("toc-label");
const kbdLabel = document.getElementById("kbd-label");
const langZh = document.getElementById("lang-zh");
const langEn = document.getElementById("lang-en");
if (source.commit) {
  sourceHash.textContent = source.shortCommit || source.commit.slice(0, 10);
  sourceBadge.href = source.commitUrl || "#";
  sourceBadge.title = `Hermes 源码基线：${source.commit}${source.commitDate ? `\n${source.commitDate}` : ""}`;
  sourceBadge.classList.toggle("dirty", Boolean(source.dirty));
  if (!source.commitUrl) sourceBadge.removeAttribute("target");
} else {
  sourceBadge.hidden = true;
}

function colorVars(i){
  const c = colors[i % colors.length];
  return `--accent:${c[0]};--accent2:${c[1]};--accentBg:${c[2]};--glow:${c[3]}`;
}

function stageText(stage, field){
  return language === "en" ? (stage[`${field}En`] || stage[field]) : stage[field];
}

function ui(zh, en){ return language === "en" ? en : zh; }

const anchorTitlesEn = {
  "AIAgent 对外入口":"AIAgent public entry",
  "统一 Conversation Loop":"Shared conversation loop",
  "工具统一执行入口":"Shared tool execution",
  "SessionDB":"SessionDB",
  "TurnContext：建立本轮 messages":"TurnContext: build turn messages",
  "messages 投影为 api_messages":"Project messages into api_messages",
  "请求前压力检查":"Pre-request context pressure check",
  "工具回填闭环":"Tool-result feedback loop",
  "压缩五阶段":"Five-stage compression",
  "统一收尾":"Shared turn finalization",
  "Memory 周期触发":"Periodic Memory trigger",
  "Finalizer 合并两个触发器":"Finalizer combines both triggers",
  "构造隔离 Review Agent":"Build an isolated Review Agent",
  "统一 Memory 写入口":"Shared Memory write entry",
  "Memory 冻结快照":"Frozen Memory snapshot",
  "Memory 进入 system prompt":"Inject Memory into system prompt",
  "Curator consolidation":"Curator consolidation",
  "execute_code 编排工具":"Orchestrate tools with execute_code",
  "委派运行方式":"Delegation execution mode",
  "角色与工具继承":"Role and tool inheritance",
  "构造独立 Child Agent":"Build an independent Child Agent",
  "启动 Child Loop":"Start the Child loop",
  "后台结果回流":"Return background results",
  "SessionDB schema":"SessionDB schema",
  "增量写入 messages":"Incrementally persist messages",
  "恢复 active transcript":"Restore the active transcript",
  "原位压缩":"In-place compaction",
  "全文搜索":"Full-text search"
};

function anchorTitle(title){ return language === "en" ? (anchorTitlesEn[title] || title) : title; }

function updateLanguageChrome(){
  document.documentElement.lang = language === "en" ? "en" : "zh-CN";
  document.title = language === "en" ? site.titleEn : site.title;
  brandText.textContent = language === "en" ? site.titleEn : site.title;
  tocLabel.textContent = ui("本页目录", "ON THIS PAGE");
  kbdLabel.textContent = ui("切换章节", "Switch chapters");
  sourceBadge.querySelector(".source-label").textContent = ui("源码基线", "Source");
  langZh.classList.toggle("active", language === "zh");
  langEn.classList.toggle("active", language === "en");
}

function setLanguage(next){
  language = next;
  localStorage.setItem("hermes-design-language", language);
  updateLanguageChrome();
  if (current < 0) renderHome(); else renderDoc(current);
}

function renderNav(){
  nav.innerHTML = "";
  site.stages.forEach((s, i) => {
    const el = document.createElement("button");
    el.type = "button";
    el.className = "chip" + (i === current ? " active" : "");
    el.setAttribute("aria-current", i === current ? "page" : "false");
    el.innerHTML = `<span class="n">${s.num}</span><span>${stageText(s, "title")}</span>`;
    el.onclick = () => renderDoc(i);
    nav.appendChild(el);
  });
}

function renderHome(){
  current = -1;
  layout.classList.add("home");
  renderNav();
  readbar.classList.remove("show");
  toc.innerHTML = `<a class="active" href="#overview">${ui("导览", "Overview")}</a><a href="#route">${ui("教学路线", "Reading path")}</a>`;
  doc.innerHTML = `
    <section class="hero" id="overview">
      <div class="hero-text">
        <h1>${language === "en" ? site.titleEn : site.title}</h1>
        <p>${ui('从 <code>run_conversation()</code> 出发，沿着同一份 <code>messages</code>，讲清 Hermes 的核心循环、自改进、子代理和持久化。','Start at <code>run_conversation()</code> and follow the same <code>messages</code> through the core loop, self-improvement, subagents, and persistence.')}</p>
        <p class="sub">${ui("只保留能对着源码讲的数据流。Provider 兼容、UI 细节和零散防御分支不进入主线。", "Focus on source-traceable data flow. Provider compatibility, UI details, and incidental defensive branches stay out of the main path.")}</p>
      </div>
      <div class="ring-wrap">
        <div class="ring">
          <svg width="118" height="118" viewBox="0 0 118 118">
            <defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="55%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#059669"/></linearGradient></defs>
            <circle class="track" cx="59" cy="59" r="50"></circle>
            <circle class="fill" cx="59" cy="59" r="50"></circle>
          </svg>
          <div class="ctr"><b>${site.stages.length}</b><span>${ui("章节", "chapters")}</span></div>
        </div>
        <div class="ring-cap">${ui("Hermes Agent 核心路线", "Hermes Agent core path")}</div>
      </div>
    </section>
    <section class="home-route" id="route">
      <div class="home-route-head">
        <div><div class="home-route-kicker">READING ORDER</div><div class="home-route-title">${ui("一条连续的源码讲解路线", "One continuous source-code walkthrough")}</div></div>
        <div class="home-route-copy">${ui("先确定核心边界，再进入一次 turn；随后观察长期知识、并行 Agent 和 durable session 如何围绕这条 loop 工作。", "Define the core boundary, enter one turn, then see how durable knowledge, parallel agents, and sessions surround that loop.")}</div>
      </div>
      <div class="route-steps">
        ${site.stages.slice(0,1).map((s,i)=>`
          <button type="button" class="route-step" style="${colorVars(i)}" onclick="renderDoc(${i})">
            <span class="route-step-num">${s.num}</span>
            <span class="route-step-title">${stageText(s, "title")}</span>
            <span class="route-step-copy">${stageText(s, "summary")}</span>
          </button>`).join("")}
        <div class="route-core">
          <span class="route-core-label">${ui("核心内容 · 第 2–4 章", "CORE · CHAPTERS 2–4")}</span>
          ${site.stages.slice(1,4).map((s,j)=>{
            const i = j + 1;
            return `<button type="button" class="route-step" style="${colorVars(i)}" onclick="renderDoc(${i})">
              <span class="route-step-num">${s.num}</span>
              <span class="route-step-title">${stageText(s, "title")}</span>
              <span class="route-step-copy">${stageText(s, "summary")}</span>
            </button>`;
          }).join("")}
        </div>
        ${site.stages.slice(4,5).map((s,j)=>{
          const i = j + 4;
          return `<button type="button" class="route-step" style="${colorVars(i)}" onclick="renderDoc(${i})">
            <span class="route-step-num">${s.num}</span>
            <span class="route-step-title">${stageText(s, "title")}</span>
            <span class="route-step-copy">${stageText(s, "summary")}</span>
          </button>`;
        }).join("")}
      </div>
    </section>`;
}

function escapeHtml(value){
  return String(value ?? "").replace(/[&<>\"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));
}

function slugify(_text, i){ return `section-${i + 1}`; }

function renderCodeAnchors(s){
  const anchors = Array.isArray(s.codeAnchors) ? s.codeAnchors : [];
  if (!anchors.length) return "";
  return `
    <section class="code-anchors" aria-labelledby="code-anchors-title">
      <div class="code-anchors-head">
        <div class="code-anchors-kicker" id="code-anchors-title">CODE ANCHORS</div>
      </div>
      <div class="code-anchor-grid">
        ${anchors.map(a => {
          const content = `
            <span class="code-anchor-top"><span class="code-anchor-title">${escapeHtml(anchorTitle(a.title))}</span><span class="code-anchor-open">${a.url ? ui("打开源码 ↗", "Open source ↗") : ui("无远程链接", "No remote link")}</span></span>
            <code class="code-anchor-range">${escapeHtml(a.range)}</code>`;
          return a.url
            ? `<a class="code-anchor" href="${escapeHtml(a.url)}" target="_blank" rel="noopener noreferrer">${content}</a>`
            : `<div class="code-anchor">${content}</div>`;
        }).join("")}
      </div>
    </section>`;
}

function buildToc(){
  const hs = [...doc.querySelectorAll("h2,h3")];
  if (!hs.length) { toc.innerHTML = `<div class="empty">${ui("暂无目录", "No sections")}</div>`; return; }
  toc.innerHTML = hs.map((h,i)=>{
    if (!h.id) h.id = slugify(h.textContent, i);
    return `<a class="${h.tagName.toLowerCase()}" href="#${h.id}">${h.textContent}</a>`;
  }).join("");
}

async function renderMermaidDiagrams(){
  const blocks = [...doc.querySelectorAll("pre > code.language-mermaid")];
  if (!blocks.length) return;
  blocks.forEach((code, idx) => {
    const wrap = document.createElement("div");
    wrap.className = "mermaid";
    wrap.id = `mermaid-${current}-${idx}`;
    wrap.textContent = code.textContent;
    code.parentElement.replaceWith(wrap);
  });
  if (!window.mermaid) return;
  try {
    await mermaid.run({ nodes: [...doc.querySelectorAll(".mermaid")] });
  } catch (err) {
    console.warn("Mermaid render failed", err);
  }
}

function renderDoc(i){
  const s = site.stages[i];
  if (!s || !s.available) return;
  current = i;
  layout.classList.remove("home");
  renderNav();
  readbar.classList.add("show");
  const raw = language === "en" ? (s.rawEn || s.raw) : s.raw;
  const rawWithoutTitle = raw.replace(/^\s*#\s+.*(?:\r?\n|$)/, "");
  const html = marked.parse(rawWithoutTitle);
  doc.innerHTML = `
    <div class="doc-hero" style="${colorVars(i)}">
      <div class="dh-top">
        <div class="dh-badge">${s.num}</div>
        <div><div class="dh-phase">${stageText(s, "phase")}</div><h1 class="dh-title">${stageText(s, "title")}</h1></div>
      </div>
      <div class="dh-meta"><span>${stageText(s, "summary")}</span></div>
    </div>
    ${renderCodeAnchors(s)}
    ${html}
    <div class="doc-foot">
      ${i > 0 ? `<button type="button" class="foot-btn" onclick="renderDoc(${i-1})"><span class="lbl">${ui("上一章", "Previous")}</span><span class="ttl">${stageText(site.stages[i-1], "title")}</span></button>` : `<div></div>`}
      ${i < site.stages.length - 1 ? `<button type="button" class="foot-btn next" onclick="renderDoc(${i+1})"><span class="lbl">${ui("下一章", "Next")}</span><span class="ttl">${stageText(site.stages[i+1], "title")}</span></button>` : `<button type="button" class="foot-btn next" onclick="renderHome()"><span class="lbl">${ui("回到", "Back to")}</span><span class="ttl">${ui("导览首页", "Guide home")}</span></button>`}
    </div>`;
  buildToc();
  renderMermaidDiagrams();
  window.scrollTo({top:0, behavior:"smooth"});
}

function updateReadbar(){
  if (current < 0) return;
  const max = document.documentElement.scrollHeight - window.innerHeight;
  readbar.style.width = max > 0 ? `${Math.min(100, Math.max(0, scrollY / max * 100))}%` : "0";
}

document.getElementById("brand").onclick = renderHome;
langZh.onclick = () => setLanguage("zh");
langEn.onclick = () => setLanguage("en");
document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft" && current > 0) renderDoc(current - 1);
  if (e.key === "ArrowRight" && current >= 0 && current < site.stages.length - 1) renderDoc(current + 1);
});
window.addEventListener("scroll", updateReadbar, {passive:true});
updateLanguageChrome();
renderHome();
</script>
</body>
</html>
