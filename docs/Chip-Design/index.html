<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>芯片设计完整流程</title>
<script src="assets/marked.min.js"></script>
<script src="content.js"></script>
<script src="cases.js"></script>
<script src="cases_en.js"></script>
<script src="secmaps.js"></script>
<script src="secmaps_en.js"></script>
<style>
  :root{
    --bg:#f5f7fb;
    --surface:#ffffff;
    --ink:#1c2330;
    --ink-soft:#5a6473;
    --ink-faint:#9aa3b2;
    --line:#e6e9ef;
    --line-soft:#eef1f5;
    --brand:#2563eb;
    --brand-soft:#eaf1ff;
    --code-bg:#f4f6f9;
    --p1:#3b82f6; --p1bg:#eaf1ff;
    --p2:#8b5cf6; --p2bg:#f1ecfe;
    --p3:#0ea5a4; --p3bg:#e3f7f6;
    --p4:#f59e0b; --p4bg:#fdf2dc;
    --p5:#ef4444; --p5bg:#fdeaea;
    --topbar-h:58px;
  }
  *{box-sizing:border-box;}
  .sr-only{position:absolute!important;width:1px!important;height:1px!important;padding:0!important;margin:-1px!important;
    overflow:hidden!important;clip:rect(0,0,0,0)!important;white-space:nowrap!important;border:0!important;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.7;font-size:15.5px;-webkit-font-smoothing:antialiased;
  }
  /* 柔和极光背景 */
  body::before{
    content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:
      radial-gradient(620px 420px at 12% -4%, rgba(59,130,246,.10), transparent 60%),
      radial-gradient(680px 460px at 92% 2%, rgba(139,92,246,.10), transparent 60%),
      radial-gradient(720px 520px at 70% 105%, rgba(14,165,164,.08), transparent 60%);
  }
  a{color:var(--brand);text-decoration:none;}

  /* ---------- 顶栏 ---------- */
  .topbar{
    position:sticky;top:0;z-index:50;height:var(--topbar-h);
    background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(12px);
    border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:0 18px;
  }
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px;white-space:nowrap;cursor:pointer;color:var(--ink);
    border:0;background:transparent;padding:0;font-family:inherit;}
  .brand:focus-visible{outline:2px solid var(--brand);outline-offset:5px;border-radius:5px;}
  .brand .dot{width:13px;height:13px;border-radius:4px;background:linear-gradient(135deg,var(--p1),var(--p2),var(--p3));background-size:200% 200%;animation:dotShift 6s ease infinite;}
  @keyframes dotShift{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
  .nav{display:flex;align-items:center;gap:3px;overflow-x:auto;flex:1;min-width:0;scrollbar-width:thin;}
  .nav::-webkit-scrollbar{height:5px;}
  .nav::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
  .chip{display:inline-flex;align-items:center;gap:5px;padding:6px 10px;border-radius:8px;white-space:nowrap;
    font-size:13px;color:var(--ink-soft);cursor:pointer;border:1px solid transparent;transition:all .15s;}
  .chip:hover{background:var(--line-soft);color:var(--ink);transform:translateY(-1px);}
  .chip .n{font-size:13px;opacity:.8;}
  .chip.active{background:var(--brand-soft);color:var(--brand);border-color:#d3e2ff;font-weight:600;}
  .chip.topic{margin-left:7px;color:#6d28d9;border-color:#ddd0fb;background:linear-gradient(110deg,#f5f0ff,#ecf8f7);}
  .chip.topic:hover{border-color:#bca7f2;background:linear-gradient(110deg,#efe7ff,#e3f7f6);}
  .chip.topic.active{color:#5b21b6;border-color:#a98de8;background:linear-gradient(110deg,#e9ddff,#dff7f4);box-shadow:0 4px 12px rgba(109,40,217,.10);}
  .chip.topic .n{font-size:12px;font-weight:800;}
  .chip.disabled{color:var(--ink-faint);cursor:not-allowed;}
  .chip.disabled:hover{background:transparent;color:var(--ink-faint);transform:none;}
  .chip.disabled .n{opacity:.5;}
  .lang-toggle{appearance:none;display:inline-flex;align-items:center;gap:5px;flex:none;padding:5px 8px;
    border:1px solid var(--line);border-radius:9px;background:rgba(255,255,255,.88);color:var(--ink-faint);
    font-family:inherit;font-size:11.5px;font-weight:700;line-height:1.3;cursor:pointer;box-shadow:0 2px 8px rgba(20,30,50,.04);transition:all .15s;}
  .lang-toggle:hover{border-color:#b8c7e6;box-shadow:0 4px 12px rgba(37,99,235,.08);}
  .lang-toggle:focus-visible{outline:2px solid var(--brand);outline-offset:2px;}
  .lang-toggle .lang-opt{padding:2px 5px;border-radius:5px;transition:all .15s;}
  .lang-toggle .lang-sep{font-weight:500;color:#c3c9d3;}
  .lang-toggle[data-lang="zh"] .lang-zh,.lang-toggle[data-lang="en"] .lang-en{background:var(--brand-soft);color:var(--brand);}

  /* 阅读进度条 */
  .readbar{position:fixed;top:var(--topbar-h);left:0;height:3px;width:0;z-index:49;
    background:linear-gradient(90deg,var(--p1),var(--p2),var(--p3));transition:width .08s linear;opacity:0;}
  .readbar.show{opacity:1;}

  /* ---------- 布局 ---------- */
  .layout{display:grid;grid-template-columns:272px minmax(0,1fr);max-width:1760px;margin:0 auto;padding:0 24px;}
  .toc{position:sticky;top:var(--topbar-h);align-self:start;height:calc(100vh - var(--topbar-h));
    overflow-y:auto;padding:26px 14px 60px 22px;border-right:1px solid var(--line);}
  .toc-title{font-size:11px;font-weight:700;letter-spacing:.09em;color:var(--ink-faint);text-transform:uppercase;margin-bottom:12px;}
  .toc a{display:block;color:var(--ink-soft);font-size:13.5px;padding:5px 10px;border-radius:7px;margin:1px 0;
    border-left:2px solid transparent;line-height:1.45;transition:all .13s;}
  .toc a:hover{background:var(--line-soft);color:var(--ink);}
  .toc a.h3{padding-left:22px;font-size:12.8px;color:var(--ink-faint);}
  .toc a.active{color:var(--brand);background:var(--brand-soft);font-weight:600;border-left-color:var(--brand);transform:translateX(2px);}
  .toc .empty{color:var(--ink-faint);font-size:13px;padding:0 10px;}
  .main{min-width:0;padding:34px 46px 120px;}

  /* ---------- 文档排版 ---------- */
  .doc{max-width:1180px;margin:0 auto;animation:fadeUp .4s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  .doc h1{font-size:27px;line-height:1.35;margin:.2em 0 .6em;font-weight:750;letter-spacing:-.01em;}
  .doc h2{font-size:21px;margin:2em 0 .7em;padding-top:.5em;font-weight:700;border-top:1px solid var(--line-soft);scroll-margin-top:74px;}
  .doc h2:first-of-type{border-top:none;}
  .doc h3{font-size:16.5px;margin:1.5em 0 .5em;font-weight:700;color:#2a3342;scroll-margin-top:74px;}
  .doc h4{font-size:15px;margin:1.2em 0 .4em;font-weight:700;color:var(--ink-soft);}
  .doc p{margin:.7em 0;}
  .doc ul,.doc ol{padding-left:1.4em;margin:.6em 0;}
  .doc li{margin:.32em 0;}
  .doc li::marker{color:var(--ink-faint);}
  .doc strong{color:#101725;font-weight:700;}
  .doc blockquote{margin:1.1em 0;padding:.6em 1.1em;background:var(--brand-soft);border-left:3px solid var(--brand);
    border-radius:0 8px 8px 0;color:#243043;}
  .doc blockquote p{margin:.3em 0;}
  .doc code{background:var(--code-bg);padding:.12em .42em;border-radius:5px;
    font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace;font-size:.88em;color:#b3406b;}
  .doc pre{background:#f4f6f9;border:1px solid var(--line);padding:14px 16px;border-radius:10px;overflow-x:auto;margin:1em 0;line-height:1.55;}
  .doc pre code{background:none;padding:0;color:#2a3342;font-size:13px;}
  .doc table{border-collapse:collapse;width:100%;margin:1.1em 0;font-size:14px;display:block;overflow-x:auto;}
  .doc th,.doc td{border:1px solid var(--line);padding:8px 12px;text-align:left;vertical-align:top;}
  .doc th{background:var(--line-soft);font-weight:700;}
  .doc tr:nth-child(even) td{background:#fafbfc;}
  .doc hr{border:none;border-top:1px solid var(--line);margin:2em 0;}
  .doc-foot{margin-top:50px;padding-top:22px;border-top:1px solid var(--line);display:flex;justify-content:space-between;gap:14px;}
  .foot-btn{display:inline-flex;flex-direction:column;gap:2px;padding:12px 18px;border:1px solid var(--line);
    border-radius:11px;background:var(--surface);min-width:160px;cursor:pointer;transition:all .15s;}
  .foot-btn:hover{border-color:var(--brand);box-shadow:0 6px 18px rgba(37,99,235,.10);transform:translateY(-2px);}
  .foot-btn .lbl{font-size:11px;color:var(--ink-faint);}
  .foot-btn .ttl{font-size:14.5px;font-weight:650;color:var(--ink);}
  .foot-btn.next{text-align:right;align-items:flex-end;margin-left:auto;}
  .foot-btn.disabled{opacity:.45;cursor:not-allowed;}
  .foot-btn.disabled:hover{border-color:var(--line);box-shadow:none;transform:none;}

  /* ---------- 首页 ---------- */
  .hero{display:flex;align-items:center;gap:30px;flex-wrap:wrap;margin-bottom:12px;}
  .hero-text{flex:1;min-width:300px;}
  .hero h1{font-size:36px;font-weight:800;letter-spacing:-.02em;margin:.1em 0 .3em;
    background:linear-gradient(100deg,#1c2330 30%,#3b82f6 55%,#8b5cf6 75%,#1c2330 95%);
    background-size:220% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;
    animation:sheen 8s ease infinite;}
  @keyframes sheen{0%,100%{background-position:0% 0;}50%{background-position:100% 0;}}
  .hero p{font-size:16px;color:var(--ink-soft);max-width:720px;margin:.3em 0;}
  .hero .sub{font-size:14px;color:var(--ink-faint);}

  /* 进度环 */
  .ring-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .ring{position:relative;width:118px;height:118px;}
  .ring svg{transform:rotate(-90deg);}
  .ring .track{fill:none;stroke:var(--line);stroke-width:9;}
  .ring .fill{fill:none;stroke:url(#rg);stroke-width:9;stroke-linecap:round;transition:stroke-dashoffset 1.1s cubic-bezier(.2,.8,.2,1);}
  .ring .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring .ctr b{font-size:27px;font-weight:800;color:var(--ink);line-height:1;}
  .ring .ctr span{font-size:11px;color:var(--ink-faint);margin-top:3px;}
  .ring-cap{font-size:12px;color:var(--ink-faint);}

  /* 互动流程图 */
  .flowmap-wrap{margin:26px 0 6px;}
  .flowmap{position:relative;display:flex;justify-content:space-between;padding:118px 8px 280px;}
  .flow-track{position:absolute;height:3px;background:var(--line);border-radius:3px;top:137px;}
  .flow-fill{position:absolute;height:3px;border-radius:3px;top:137px;
    background:linear-gradient(90deg,var(--p1),var(--p2),var(--p3));background-size:200% 100%;
    animation:flow 2.4s linear infinite;box-shadow:0 0 10px rgba(59,130,246,.4);}
  @keyframes flow{0%{background-position:0% 0;}100%{background-position:200% 0;}}
  .flow-node{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;z-index:3;}
  .node-dot{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:15px;background:var(--surface);border:2px solid var(--line);color:var(--ink-faint);
    transition:transform .18s,box-shadow .18s;cursor:default;font-family:inherit;padding:0;}
  .flow-node.ready .node-dot{color:#fff;border-color:transparent;background:linear-gradient(135deg,var(--accent),var(--accent2,var(--accent)));
    box-shadow:0 4px 14px var(--glow);cursor:pointer;}
  .flow-node.ready:hover .node-dot{transform:translateY(-4px) scale(1.12);box-shadow:0 9px 22px var(--glow);}
  .flow-node.ready:focus-within .node-dot{transform:translateY(-4px) scale(1.12);box-shadow:0 9px 22px var(--glow);}
  .flow-node.dft-hovered .node-dot{box-shadow:0 0 0 4px rgba(124,58,237,.18),0 8px 20px var(--glow);transform:translateY(-2px) scale(1.07);}
  .node-dot:focus-visible{outline:3px solid var(--surface);box-shadow:0 0 0 5px var(--accent),0 9px 22px var(--glow)!important;}
  .flow-node.locked .node-dot{border-style:dashed;}
  .flow-node.nextup .node-dot{animation:pulse 1.8s ease-in-out infinite;border-color:var(--accent);color:var(--accent);}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--glow);}50%{box-shadow:0 0 0 7px transparent;}}
  .node-label{margin-top:9px;font-size:11.5px;color:var(--ink-soft);text-align:center;max-width:74px;line-height:1.3;}
  .flow-node.ready .node-label{color:var(--ink);font-weight:600;}
  .node-pop{position:absolute;top:78px;left:50%;transform:translateX(-50%) translateY(6px);
    width:208px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:11px 13px;
    box-shadow:0 12px 30px rgba(20,30,50,.13);opacity:0;visibility:hidden;transition:all .16s;z-index:5;pointer-events:none;}
  .node-pop::before{content:"";position:absolute;top:-6px;left:50%;transform:translateX(-50%) rotate(45deg);
    width:10px;height:10px;background:var(--surface);border-left:1px solid var(--line);border-top:1px solid var(--line);}
  .flow-node:hover .node-pop,.flow-node:focus-within .node-pop{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0);}
  .node-pop .pt{font-size:13px;font-weight:700;margin-bottom:4px;color:var(--ink);}
  .node-pop .pd{font-size:12px;color:var(--ink-soft);line-height:1.5;}
  .node-pop .dft-node-role{margin-top:7px;padding-top:6px;border-top:1px solid #e5dcfb;color:#6d28d9;font-size:10.5px;font-weight:700;line-height:1.4;}

  /* 流程节点小组成员：与下方环节简介同步出现 */
  .node-members{position:absolute;left:50%;bottom:calc(100% + 10px);transform:translateX(-50%) translateY(6px);
    width:238px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px 11px 11px;
    box-shadow:0 12px 30px rgba(20,30,50,.13);opacity:0;visibility:hidden;transition:all .16s;
    z-index:6;pointer-events:none;text-align:center;}
  .node-members::after{content:"";position:absolute;bottom:-6px;left:50%;transform:translateX(-50%) rotate(45deg);
    width:10px;height:10px;background:var(--surface);border-right:1px solid var(--line);border-bottom:1px solid var(--line);}
  .flow-node:hover .node-members,.flow-node:focus-within .node-members{
    opacity:1;visibility:visible;transform:translateX(-50%) translateY(0);}
  .node-members .ot{font-size:10.5px;font-weight:800;letter-spacing:.08em;color:var(--accent);margin-bottom:7px;}
  .member-list{display:flex;justify-content:center;gap:5px;flex-wrap:wrap;}
  .member-tag{display:inline-flex;align-items:center;min-height:24px;padding:3px 8px;border-radius:999px;
    background:var(--accentBg,var(--brand-soft));color:var(--ink);font-size:11.5px;font-weight:650;line-height:1.35;white-space:nowrap;}
  .member-tag.pending{background:var(--line-soft);color:var(--ink-faint);border:1px dashed #cbd1dc;}

  /* DFT设计：与 13 个主节点严格对齐的跨阶段泳道 */
  .dft-map{position:absolute;left:8px;right:8px;top:280px;height:126px;z-index:2;
    display:grid;grid-template-columns:repeat(13,minmax(0,1fr));pointer-events:none;}
  .dft-scope-frame{position:absolute;left:0;right:0;top:-16px;height:136px;border:2px solid rgba(124,58,237,.30);
    border-radius:17px;background:linear-gradient(90deg,rgba(124,58,237,.045),rgba(14,165,164,.025));
    box-shadow:0 10px 28px rgba(76,29,149,.055);z-index:0;pointer-events:none;}
  .dft-scope-frame>span{position:absolute;top:-11px;padding:2px 9px;border:1px solid #cfbff5;border-radius:999px;
    background:var(--bg);color:#5b21b6;font-size:9.5px;font-weight:850;line-height:1.4;white-space:nowrap;
    box-shadow:0 3px 10px rgba(76,29,149,.08);}
  .dft-entry-wrap{position:relative;z-index:6;grid-column:1 / 3;align-self:start;height:100px;margin:5px 6px 0 8px;
    pointer-events:auto;--accent:#7c3aed;--accentBg:#f1ecfe;}
  .dft-entry{position:relative;z-index:1;width:100%;height:100%;padding:10px 8px;
    display:flex;flex-direction:column;justify-content:center;border:1px solid #cfc0f7;border-radius:13px;
    background:linear-gradient(145deg,#f5f0ff,#fff);box-shadow:0 8px 22px rgba(76,29,149,.08);
    color:var(--ink);transition:transform .16s,box-shadow .16s,border-color .16s;}
  .dft-entry-wrap:hover .dft-entry,.dft-entry:focus-visible{transform:translateY(-2px);border-color:#8b5cf6;
    box-shadow:0 11px 26px rgba(76,29,149,.14);outline:none;}
  .dft-entry .de-kicker{font-size:8.5px;font-weight:850;letter-spacing:.08em;color:#7c3aed;line-height:1.25;white-space:nowrap;}
  .dft-entry b{font-size:15px;color:#4c1d95;line-height:1.4;margin-top:2px;white-space:nowrap;}
  .dft-entry .de-legend{font-size:8.8px;color:var(--ink-soft);line-height:1.45;margin-top:2px;white-space:nowrap;}
  .dft-entry .de-go{font-size:10px;font-weight:750;color:#6d28d9;line-height:1.35;margin-top:3px;}
  .dft-entry-tip{position:absolute;left:50%;--tip-x:-50%;transform:translateX(var(--tip-x)) translateY(6px);
    background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:0 12px 30px rgba(20,30,50,.13);
    opacity:0;visibility:hidden;transition:opacity .16s,visibility .16s,transform .16s;z-index:8;pointer-events:none;}
  .dft-entry-members{bottom:calc(100% + 12px);width:260px;padding:10px 11px 11px;text-align:center;}
  .dft-entry-members::after{content:"";position:absolute;bottom:-6px;left:50%;width:10px;height:10px;background:var(--surface);
    border-right:1px solid var(--line);border-bottom:1px solid var(--line);transform:translateX(-50%) rotate(45deg);}
  .dft-entry-members .ot{font-size:10.5px;font-weight:800;letter-spacing:.08em;color:#7c3aed;margin-bottom:7px;}
  .dft-entry-summary{top:calc(100% + 12px);width:320px;padding:12px 14px 13px;text-align:left;border-top:3px solid #7c3aed;}
  .dft-entry-summary::before{content:"";position:absolute;top:-7px;left:50%;width:10px;height:10px;background:var(--surface);
    border-left:1px solid var(--line);border-top:1px solid var(--line);transform:translateX(-50%) rotate(45deg);}
  .dft-entry-summary .pt{font-size:13px;font-weight:750;color:#4c1d95;margin-bottom:5px;}
  .dft-entry-summary .pd{font-size:12px;color:var(--ink-soft);line-height:1.55;}
  .dft-entry-wrap:hover .dft-entry-tip,.dft-entry-wrap:focus-within .dft-entry-tip{
    opacity:1;visibility:visible;transform:translateX(var(--tip-x)) translateY(0);}
  .dft-track{position:absolute;top:29px;height:0;border-top:2px dashed #c4b5fd;z-index:1;pointer-events:none;}
  .dft-track.segment{height:3px;border:0;border-radius:999px;top:28px;}
  .dft-track.plan{background:#8b5cf6;}
  .dft-track.focus{height:5px;top:27px;background:#6d28d9;box-shadow:0 0 0 3px rgba(109,40,217,.10);}
  .dft-track.silicon{background:#0f9f9b;}
  .dft-focus-window{position:absolute;top:-3px;height:113px;border:1.5px solid rgba(109,40,217,.30);border-radius:13px;
    background:rgba(109,40,217,.065);z-index:1;pointer-events:none;}
  .dft-focus-window span{position:absolute;left:50%;top:-9px;transform:translateX(-50%);padding:2px 8px;border-radius:999px;
    background:#fff;color:#5b21b6;border:1px solid #cfc0f7;box-shadow:0 3px 10px rgba(76,29,149,.09);
    font-size:9.5px;font-weight:850;line-height:1.4;white-space:nowrap;}
  .dft-transit-note{position:absolute;top:6px;text-align:center;color:#7b8492;font-size:9.5px;font-weight:700;
    line-height:1.35;white-space:nowrap;z-index:4;pointer-events:none;}
  .dft-transit-note span{display:inline-block;padding:2px 7px;border-radius:999px;background:var(--bg);}
  .dft-touchpoint{position:relative;grid-row:1;align-self:start;justify-self:stretch;margin:24px 4px 0;
    z-index:3;text-align:center;--tp:#7c3aed;--tp-bg:#f5f0ff;pointer-events:auto;}
  .dft-touchpoint::before{content:"";position:absolute;left:50%;top:-112px;height:137px;
    border-left:2px solid var(--tp);opacity:.24;transform:translateX(-50%);z-index:-1;}
  .dft-touchpoint.collab{--tp:#7c6b9d;--tp-bg:#faf9fd;}
  .dft-touchpoint.collab::before{border-left-style:dashed;opacity:.38;}
  .dft-touchpoint.focus{--tp:#6d28d9;--tp-bg:#f1ecfe;}
  .dft-touchpoint.focus::before{border-left-width:3px;opacity:.52;}
  .dft-touchpoint.silicon{--tp:#0f8f8b;--tp-bg:#e9f8f7;}
  .dft-touchpoint.silicon::before{opacity:.34;}
  .dft-anchor{display:block;width:11px;height:11px;margin:0 auto;border-radius:50%;background:var(--tp);
    border:2px solid #fff;box-shadow:0 0 0 3px color-mix(in srgb,var(--tp) 18%,transparent);}
  .dft-touchpoint.collab .dft-anchor{width:10px;height:10px;border-radius:3px;background:#fff;border:2px solid var(--tp);
    box-shadow:none;transform:rotate(45deg);margin-top:1px;}
  .dft-tp-label{display:block;min-height:46px;margin-top:7px;padding:5px 3px 4px;border:1px solid color-mix(in srgb,var(--tp) 31%,#e6e9ef);
    border-top:3px solid var(--tp);border-radius:9px;background:var(--tp-bg);box-shadow:0 4px 12px rgba(20,30,50,.055);
    transition:transform .15s,box-shadow .15s,border-color .15s;}
  .dft-tp-label b{display:block;color:var(--ink);font-size:10.3px;line-height:1.25;white-space:nowrap;}
  .dft-tp-label small{display:block;margin-top:2px;color:var(--ink-soft);font-size:9.2px;font-weight:650;line-height:1.25;}
  .dft-touchpoint:hover .dft-tp-label,.dft-touchpoint.is-active .dft-tp-label,
  .dft-entry-wrap:hover~.dft-touchpoint .dft-tp-label,.dft-entry-wrap:focus-within~.dft-touchpoint .dft-tp-label{
    transform:translateY(-2px);border-color:var(--tp);box-shadow:0 7px 16px rgba(76,29,149,.11);}

  /* 项目时间线 */
  .project-timeline{margin:62px 0 42px;}
  .pt-head{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:16px;}
  .pt-kicker{display:block;font-size:10.5px;font-weight:800;letter-spacing:.10em;color:var(--brand);text-transform:uppercase;margin-bottom:2px;}
  .pt-title{margin:0;font-size:21px;line-height:1.35;font-weight:800;color:var(--ink);letter-spacing:-.01em;}
  .pt-guide{display:flex;align-items:center;gap:11px;flex-wrap:wrap;font-size:11.5px;color:var(--ink-faint);}
  .pt-guide span{display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
  .pt-guide span::before{content:"";width:7px;height:7px;border-radius:50%;background:linear-gradient(135deg,var(--p1),var(--p2));}
  .pt-swipe{display:none!important;}
  .pt-frame{overflow:hidden;border:1px solid var(--line);border-radius:18px;
    background:linear-gradient(180deg,#f8faff 0%,#fff 52%,#fafbfc 100%);box-shadow:0 8px 26px rgba(20,30,50,.055);}
  .pt-scroll{overflow-x:auto;overscroll-behavior-x:contain;scrollbar-width:thin;scrollbar-color:#d9deea transparent;}
  .pt-scroll::-webkit-scrollbar{height:6px;}
  .pt-scroll::-webkit-scrollbar-thumb{background:#d9deea;border-radius:999px;}
  .pt-scroll:focus-visible{outline:2px solid var(--brand);outline-offset:-3px;}
  .pt-board{min-width:1000px;padding:172px 54px 150px;}
  .pt-axis{position:relative;height:72px;margin:0;}
  .pt-axis::before{content:"";position:absolute;left:0;right:0;top:10px;height:4px;border-radius:999px;
    background:var(--line);box-shadow:0 0 12px rgba(59,130,246,.12);}
  .pt-pop{position:absolute;width:270px;max-width:calc(100vw - 48px);background:var(--surface);border:1px solid var(--line);border-radius:12px;
    padding:12px 14px 13px;box-shadow:0 12px 30px rgba(20,30,50,.13);opacity:0;visibility:hidden;
    --pop-x:-50%;transform:translateX(var(--pop-x)) translateY(6px);transition:opacity .16s,visibility .16s,transform .16s;
    z-index:6;pointer-events:none;text-align:left;}
  .pt-tag{display:inline-flex;align-items:center;padding:3px 8px;border-radius:6px;background:var(--tl-bg);color:var(--tl);
    font-size:10.5px;font-weight:800;line-height:1.4;}
  .pt-pop h3{margin:8px 0 5px;font-size:14px;line-height:1.4;font-weight:750;color:var(--ink);}
  .pt-pop p{margin:0;font-size:12.5px;line-height:1.6;color:var(--ink-soft);}
  .pt-period{position:absolute;left:var(--start);width:var(--span);top:0;height:20px;z-index:2;}
  .pt-segment{appearance:none;position:absolute;inset:-8px 0;border:0;background:transparent;padding:0;cursor:pointer;border-radius:999px;touch-action:pan-x;}
  .pt-segment::before{content:"";position:absolute;left:9px;right:9px;top:18px;height:6px;border-radius:999px;
    background:linear-gradient(90deg,var(--tl),var(--tl2,var(--tl)));opacity:.72;transition:height .16s,top .16s,opacity .16s,box-shadow .16s;}
  .pt-period:hover .pt-segment::before,.pt-period:focus-within .pt-segment::before{
    height:9px;top:16px;opacity:1;box-shadow:0 0 12px var(--glow);}
  .pt-segment:focus-visible{outline:none;}
  .pt-segment:focus-visible::before{box-shadow:0 0 0 3px #fff,0 0 0 5px var(--tl),0 0 14px var(--glow);}
  .pt-task-pop{left:50%;bottom:calc(100% + 18px);border-top:3px solid var(--tl);}
  .pt-task-pop::after{content:"";position:absolute;bottom:-6px;left:50%;width:10px;height:10px;background:var(--surface);
    border-right:1px solid var(--line);border-bottom:1px solid var(--line);transform:translateX(-50%) rotate(45deg);}
  .pt-period:hover .pt-task-pop,.pt-period:focus-within .pt-task-pop{
    opacity:1;visibility:visible;transform:translateX(var(--pop-x)) translateY(0);}
  .pt-milestone{position:absolute;left:var(--x);top:-10px;width:84px;height:70px;z-index:3;transform:translateX(-50%);}
  .pt-point{appearance:none;border:0;background:transparent;width:84px;min-height:64px;padding:10px 7px 0;touch-action:pan-x;
    display:flex;flex-direction:column;align-items:center;color:inherit;font-family:inherit;cursor:pointer;border-radius:12px;}
  .pt-dot{width:24px;height:24px;border:5px solid #fff;border-radius:50%;background:var(--dot);transition:transform .16s,box-shadow .16s;
    box-shadow:0 0 0 2px var(--dot),0 4px 10px var(--glow);}
  .pt-date{margin-top:7px;padding:2px 8px;border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--ink);
    font-size:11.5px;font-weight:750;white-space:nowrap;box-shadow:0 2px 7px rgba(20,30,50,.05);transition:all .16s;}
  .pt-milestone:hover .pt-dot,.pt-milestone:focus-within .pt-dot{transform:scale(1.18);box-shadow:0 0 0 3px var(--dot),0 7px 16px var(--glow);}
  .pt-milestone:hover .pt-date,.pt-milestone:focus-within .pt-date{
    color:var(--dot);border-color:var(--dot);background:var(--dot-bg,#fff);}
  .pt-point:focus-visible{outline:2px solid var(--dot);outline-offset:2px;}
  .pt-criterion-pop{left:50%;top:calc(100% + 8px);border-bottom:3px solid var(--tl);background:#fbfcfe;}
  .pt-criterion-pop::before{content:"";position:absolute;top:-6px;left:50%;width:10px;height:10px;background:#fbfcfe;
    border-left:1px solid var(--line);border-top:1px solid var(--line);transform:translateX(-50%) rotate(45deg);}
  .pt-milestone:hover .pt-criterion-pop,.pt-milestone:focus-within .pt-criterion-pop{
    opacity:1;visibility:visible;transform:translateX(var(--pop-x)) translateY(0);}
  .pt-milestone.edge-start .pt-criterion-pop{--pop-x:0%;}
  .pt-milestone.edge-start .pt-criterion-pop::before{left:18px;}
  .pt-milestone.edge-end .pt-criterion-pop{left:auto;right:50%;--pop-x:0%;}
  .pt-milestone.edge-end .pt-criterion-pop::before{left:auto;right:18px;}

  /* 阶段卡片 */
  .phase{margin-top:34px;}
  .phase-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .phase-tag{font-size:12px;font-weight:700;padding:3px 11px;border-radius:7px;letter-spacing:.02em;}
  .phase-line{flex:1;height:1px;background:var(--line);}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(228px,1fr));gap:14px;}
  .card{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:16px 16px 15px;cursor:pointer;transition:transform .16s,box-shadow .16s,border-color .16s;overflow:hidden;
    width:100%;font:inherit;color:inherit;text-align:left;}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent,var(--brand));transform:scaleY(.55);transition:transform .16s;}
  .card:hover::before{transform:scaleY(1);}
  .card:hover{transform:translateY(-4px);box-shadow:0 12px 28px rgba(20,30,50,.10);border-color:var(--accent,var(--brand));}
  .card:focus-visible{outline:3px solid color-mix(in srgb,var(--accent,var(--brand)) 45%,transparent);outline-offset:2px;
    border-color:var(--accent,var(--brand));}
  .card.locked{cursor:not-allowed;opacity:.7;}
  .card.locked:hover{transform:none;box-shadow:none;border-color:var(--line);}
  .card.locked::before{opacity:.4;}
  .card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
  .card-num{font-size:23px;font-weight:800;color:var(--accent,var(--brand));line-height:1;}
  .badge{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:6px;}
  .badge.ready{background:var(--p3bg);color:var(--p3);}
  .badge.soon{background:var(--line-soft);color:var(--ink-faint);}
  .card h3{font-size:16px;margin:0 0 6px;font-weight:700;color:var(--ink);}
  .card p{font-size:13px;color:var(--ink-soft);margin:0;line-height:1.55;}

  /* 滚动揭示 */
  .reveal{opacity:0;transform:translateY(16px);transition:opacity .55s ease,transform .55s ease;}
  .reveal.in{opacity:1;transform:none;}

  /* 快捷键提示 */
  .kbd-hint{position:fixed;bottom:16px;right:18px;font-size:12px;color:var(--ink-faint);
    background:rgba(255,255,255,.8);border:1px solid var(--line);border-radius:8px;padding:6px 10px;
    backdrop-filter:blur(6px);z-index:40;opacity:0;transition:opacity .3s;}
  .kbd-hint.show{opacity:1;}
  .kbd-hint kbd{background:var(--line-soft);border:1px solid var(--line);border-radius:4px;padding:1px 6px;font-size:11px;font-family:inherit;margin:0 1px;}

  /* ========== 文档页:可视化增强 ========== */
  /* 文档 hero */
  .doc-hero{position:relative;border:1px solid var(--line);border-radius:18px;
    padding:22px 24px 18px;margin:0 0 14px;overflow:hidden;
    background:linear-gradient(120deg,var(--accentBg),#ffffff 72%);}
  .doc-hero::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;
    background:radial-gradient(circle,var(--glow),transparent 70%);opacity:.7;}
  .dh-top{display:flex;align-items:center;gap:16px;position:relative;z-index:1;}
  .dh-badge{width:54px;height:54px;border-radius:15px;display:grid;place-items:center;font-size:26px;font-weight:800;
    color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 7px 18px var(--glow);flex:none;}
  .dh-phase{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.03em;}
  .dh-title{font-size:25px;font-weight:800;margin:3px 0 0;letter-spacing:-.01em;}
  .dh-meta{display:flex;gap:16px;margin-top:13px;font-size:12.5px;color:var(--ink-soft);position:relative;z-index:1;}
  .dh-stepper{display:flex;gap:5px;margin-top:15px;flex-wrap:wrap;position:relative;z-index:1;}
  .dh-step{width:22px;height:8px;border:0;padding:0;border-radius:5px;background:var(--line);transition:transform .15s;}
  .dh-step.avail{cursor:pointer;}
  .dh-step.avail:hover,.dh-step.avail:focus-visible{transform:scaleY(1.5);outline:2px solid var(--accent);outline-offset:2px;}
  .dh-step.cur{width:36px;box-shadow:0 0 0 3px var(--accentBg);}
  .doc-hero.crosscut{background:linear-gradient(120deg,#f1ecfe,#e7f7f6 58%,#fff 100%);border-color:#d9cdf7;}
  .doc-hero.crosscut .dh-badge{font-size:19px;border-radius:50%;}
  .doc-hero.crosscut .dh-stepper{padding:7px 9px;border-radius:9px;background:linear-gradient(90deg,rgba(139,92,246,.10),rgba(14,165,164,.10),rgba(245,158,11,.08));}

  /* 章节分块 + 标题序号片 */
  .doc-lead{margin:0;}
  .doc-lead hr{display:none;}
  .doc blockquote.series-nav{display:none;}
  .doc-section{margin-bottom:4px;}
  .sec-chip{display:inline-grid;place-items:center;width:30px;height:30px;border-radius:9px;
    font-size:15px;margin-right:10px;background:var(--accentBg,#eef1f5);vertical-align:middle;line-height:1;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.04);}
  .doc-section h3 .sec-chip{width:24px;height:24px;font-size:13px;border-radius:7px;margin-right:8px;}

  /* callout 引用 */
  .doc blockquote{position:relative;padding-left:2.7em;}
  .doc blockquote::before{content:"💡";position:absolute;left:.85em;top:.5em;font-size:1.05em;}

  /* 代码块 / 示意图 + 复制 */
  .doc pre{position:relative;}
  .doc pre.diagram{background:linear-gradient(135deg,#f3f7ff,#f7f4ff);border:1px dashed #c7d3ea;}
  .doc pre.diagram::before{content:attr(data-label);position:absolute;top:7px;left:12px;font-size:10px;
    letter-spacing:.08em;color:var(--ink-faint);font-family:inherit;}
  .doc pre.diagram code{display:block;padding-top:14px;text-align:center;}
  .copy-btn{position:absolute;top:7px;right:8px;font-size:11px;color:var(--ink-soft);background:rgba(255,255,255,.85);
    border:1px solid var(--line);border-radius:6px;padding:3px 9px;cursor:pointer;font-family:inherit;transition:all .13s;opacity:0;}
  .doc pre:hover .copy-btn,.doc pre:focus-within .copy-btn,.copy-btn:focus-visible{opacity:1;}
  .copy-btn:hover{color:var(--brand);border-color:var(--brand);}

  /* 表格行悬停 */
  .doc tbody tr{transition:background .12s;}
  .doc tbody tr:hover td{background:#eef4ff !important;}

  /* 「致命的坑」章节:列表变警示卡 */
  .warn-section ol{list-style:none;padding-left:0;}
  .warn-section ol>li{position:relative;background:var(--p5bg);border:1px solid #f7d4d4;border-radius:10px;
    padding:10px 14px 10px 42px;margin:9px 0;}
  .warn-section ol>li::before{content:"⚠️";position:absolute;left:13px;top:9px;font-size:14px;}
  .warn-section ol>li strong{color:#c0392b;}

  /* 正文列表 → 整组打包成一个小块(粒度:每个列表一块,而非每条一块) */
  .doc-section:not(.warn-section) > ul,
  .doc-section:not(.warn-section) > ol{
    background:#fff;border:1px solid var(--line);border-left:3px solid var(--accent,var(--brand));
    border-radius:12px;padding:13px 18px 13px 34px;margin:1.05em 0;
    transition:box-shadow .15s,border-color .15s;}
  .doc-section:not(.warn-section) > ul:hover,
  .doc-section:not(.warn-section) > ol:hover{
    box-shadow:0 4px 18px rgba(20,30,50,.07);border-color:var(--accent,var(--brand));}
  .doc-section:not(.warn-section) > ul > li,
  .doc-section:not(.warn-section) > ol > li{margin:.42em 0;padding-left:3px;}
  .doc-section:not(.warn-section) > ul > li::marker,
  .doc-section:not(.warn-section) > ol > li::marker{color:var(--accent,var(--brand));font-weight:700;}
  /* 块内子列表:普通缩进 */
  .doc-section > ul > li ul,.doc-section > ul > li ol,
  .doc-section > ol > li ul,.doc-section > ol > li ol{margin:.4em 0 .15em;padding-left:1.3em;}

  /* ========== 真实芯片案例(TPU)组件 ========== */
  .case{margin:20px 0 10px;border:1px solid var(--line);border-radius:16px;overflow:hidden;
    background:linear-gradient(180deg,var(--accentBg,#f1ecfe),#fff 76px);box-shadow:0 6px 22px rgba(20,30,50,.05);}
  .case-hd{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .case-badge{font-size:11px;font-weight:800;color:#fff;letter-spacing:.02em;white-space:nowrap;
    background:linear-gradient(135deg,var(--accent,#8b5cf6),var(--accent2,#a78bfa));padding:5px 11px;border-radius:8px;}
  .case-ttl{font-weight:800;font-size:15.5px;color:var(--ink);}
  .case-one{flex-basis:100%;font-size:13px;color:var(--ink-soft);line-height:1.6;margin-top:1px;}
  .case-bd{padding:14px 16px 16px;}
  .case-figure{background:#fff;border:1px solid var(--line);border-radius:12px;padding:8px 10px;}
  .cs-svg{display:block;width:100%;height:auto;font-family:inherit;}
  .case-step{display:flex;align-items:center;gap:7px;margin-top:11px;flex-wrap:wrap;}
  .case-btn{font-size:13px;border:1px solid var(--line);background:#fff;color:var(--ink-soft);
    border-radius:8px;padding:5px 11px;cursor:pointer;transition:all .13s;white-space:nowrap;font-family:inherit;}
  .case-btn:hover{border-color:var(--accent);color:var(--accent);}
  .case-cap{flex:1;min-width:200px;font-size:13px;color:var(--ink);background:var(--accentBg,#f1ecfe);
    border-radius:8px;padding:7px 11px;line-height:1.5;}
  .case-legend{display:flex;flex-wrap:wrap;gap:7px;margin-top:13px;}
  .cs-leg{font-size:12px;border:1px solid var(--line);border-radius:999px;padding:4px 11px;cursor:pointer;
    background:#fff;display:inline-flex;gap:6px;align-items:center;transition:all .13s;font-family:inherit;color:inherit;}
  .cs-leg:hover{border-color:var(--accent);color:var(--accent);background:var(--accentBg);}
  .cs-leg .dot{width:8px;height:8px;border-radius:50%;background:var(--accent,#8b5cf6);flex:none;}
  .case-desc{font-size:12.5px;color:var(--ink-soft);margin-top:9px;line-height:1.6;}
  /* 设计生命周期 tab */
  .case-life{margin-top:15px;border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  .life-tabs{display:flex;flex-wrap:wrap;gap:3px;background:#f6f4fb;padding:5px;border-bottom:1px solid var(--line);}
  .life-tab{flex:1;min-width:118px;font-size:12.5px;font-weight:600;color:var(--ink-soft);background:transparent;
    border:none;border-radius:8px;padding:8px 9px;cursor:pointer;transition:all .13s;white-space:nowrap;font-family:inherit;}
  .life-tab:hover{color:var(--accent);}
  .life-tab.active{background:#fff;color:var(--accent);box-shadow:0 1px 5px rgba(20,30,50,.08);font-weight:700;}
  .life-panel{display:none;padding:13px 16px;animation:fadeUp .25s ease both;}
  .life-panel.active{display:block;}
  .life-panel ul{margin:0;padding-left:1.25em;}
  .life-panel li{margin:.55em 0;font-size:13.5px;line-height:1.62;color:var(--ink);}
  .life-intro{font-size:12.5px;color:var(--ink-faint);margin-bottom:9px;}
  .case-specs{display:grid;grid-template-columns:repeat(auto-fill,minmax(152px,1fr));gap:8px;}
  .spec{background:#fff;border:1px solid var(--line);border-left:3px solid var(--accent,#8b5cf6);border-radius:9px;padding:8px 11px;}
  .spec .k{font-size:11px;color:var(--ink-faint);}
  .spec .v{font-size:13.5px;font-weight:700;color:var(--ink);margin-top:2px;}
  .case-src{font-size:11px;color:var(--ink-faint);margin-top:12px;font-style:italic;}
  .case-lang-note{margin:20px 0 10px;padding:18px 20px;border:1px solid #cfe0ff;border-radius:14px;
    background:linear-gradient(135deg,#eef5ff,#f7f3ff);box-shadow:0 5px 18px rgba(37,99,235,.06);}
  .case-lang-note .case-note-title{display:block;margin:0 0 6px;font-size:15.5px;font-weight:800;color:var(--ink);}
  .case-lang-note p{margin:0;color:var(--ink-soft);font-size:13px;line-height:1.6;}
  .case-lang-note button{margin-top:11px;padding:7px 12px;border:1px solid #b7cdf8;border-radius:8px;background:#fff;
    color:var(--brand);font-family:inherit;font-size:12px;font-weight:700;line-height:1.3;cursor:pointer;transition:all .15s;}
  .case-lang-note button:hover{background:var(--brand);border-color:var(--brand);color:#fff;transform:translateY(-1px);}
  /* SVG 基础与高亮态 */
  .cs-box{fill:#fff;stroke:#cbd5e1;stroke-width:1.5;}
  .cs-cell{fill:#faf7ff;stroke:#c4b5fd;stroke-width:1.2;}
  .cs-cellt{fill:#7c5cce;font-size:11px;text-anchor:middle;font-weight:700;}
  .cs-t{fill:#1c2330;font-size:12.5px;text-anchor:middle;font-weight:600;}
  .cs-sub{fill:#5a6473;font-size:10px;text-anchor:middle;}
  .cs-arr{stroke:#94a3b8;stroke-width:1.8;fill:none;}
  .cs-note{fill:#64748b;font-size:10.5px;}
  .cs-part{transition:opacity .22s,filter .22s;}
  .cs-part.is-dim{opacity:.2;}
  .cs-part.is-hl .cs-cell{stroke:var(--accent,#8b5cf6);stroke-width:2.4;fill:var(--accentBg,#f1ecfe);}
  .cs-part.is-hl .cs-box{stroke:var(--accent,#8b5cf6);stroke-width:2.4;}
  .cs-part.is-hl .cs-arr{stroke:var(--accent,#8b5cf6);stroke-width:2.4;}

function captureReadingPosition(){
  const y=window.scrollY||document.documentElement.scrollTop||0;
  let section='';
  document.querySelectorAll('#content h2,#content h3').forEach(h=>{
    if(h.getBoundingClientRect().top<=Math.max(90,innerHeight*.22)){
      const m=(h.dataset.title||h.textContent||'').match(/^(\d+(?:\.\d+)*)\.?\s/);
      if(m) section=m[1];
    }
  });
  return {y,section};
}
function restoreReadingPosition(pos){
  if(pos.section){
    const target=Array.from(document.querySelectorAll('#content h2,#content h3')).find(h=>
      (h.dataset.title||h.textContent||'').match(new RegExp('^'+pos.section.replace(/\./g,'\\.')+'(?:\\.|\\s)')));
    if(target){ target.scrollIntoView({behavior:'auto',block:'start'}); return; }
  }
  window.scrollTo(0,pos.y);
}

function buildNav(activePrefix){
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  [...STAGES, ...TOPICS].forEach(s=>{
    const isTopic = TOPICS.includes(s);
    const available=docAvailable(s);
    const el = document.createElement(available ? 'a' : 'span');
    el.className = 'chip' + (isTopic ? ' topic' : '') + (available ? '' : ' disabled') + (s.prefix===activePrefix ? ' active' : '');
    el.innerHTML = isTopic ? `<span class="n">↔</span>${esc(stageTitle(s))}` : `<span class="n">${s.num}</span>${esc(stageTitle(s))}`;
    if(available){ el.href = '#/'+s.prefix; el.title = stageSummary(s); }
    else el.title = L().notWritten;
    nav.appendChild(el);
  });
  requestAnimationFrame(()=>{
    const active=nav.querySelector('.chip.active');
    if(!active) return;
    const left=Math.max(0,active.offsetLeft-(nav.clientWidth-active.offsetWidth)/2);
    if(typeof nav.scrollTo==='function') nav.scrollTo({left,behavior:'smooth'}); else nav.scrollLeft=left;
  });
}

}
let spyObserver = null;
function buildToc(container){
  const toc = document.getElementById('toc');
  toc.innerHTML = '';
  const heads = container.querySelectorAll('h2, h3');
  if(!heads.length){ toc.innerHTML = '<div class="empty">—</div>'; return; }
  const used = new Set();
  heads.forEach(h=>{
    const label = h.dataset.title || h.textContent;
    h.id = slugify(label, used);
    const a = document.createElement('a');
    a.href = '#'+h.id; a.textContent = label;
    a.className = (h.tagName==='H3') ? 'h3' : '';
    a.dataset.target = h.id;
    a.addEventListener('click', e=>{ e.preventDefault();
      document.getElementById(h.id).scrollIntoView({behavior:'smooth', block:'start'}); });
    toc.appendChild(a);
  });
  if(spyObserver) spyObserver.disconnect();
  const links = {};
  document.querySelectorAll('#toc a').forEach(a=> links[a.dataset.target]=a);
  const visible = new Set();
  spyObserver = new IntersectionObserver(entries=>{
    entries.forEach(en=> en.isIntersecting ? visible.add(en.target.id) : visible.delete(en.target.id));
    let top=null, topY=Infinity;
    visible.forEach(id=>{ const y=document.getElementById(id).getBoundingClientRect().top; if(y<topY){topY=y;top=id;} });
    Object.values(links).forEach(a=>a.classList.remove('active'));
    if(top && links[top]) links[top].classList.add('active');
  }, {rootMargin:'-70px 0px -70% 0px', threshold:0});
  heads.forEach(h=>spyObserver.observe(h));
}

/* ---------- 滚动揭示 ---------- */
let revealObs = null;
function setupReveal(){
  if(revealObs) revealObs.disconnect();
  revealObs = new IntersectionObserver(es=>{
    es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); revealObs.unobserve(e.target);} });
  }, {threshold:0, rootMargin:'0px 0px -8% 0px'});
  document.querySelectorAll('.reveal').forEach(el=>revealObs.observe(el));
}

    {date:tl.dates[0],x:'0%',c:'var(--p1)',bg:'var(--p1bg)',glow:'rgba(59,130,246,.30)',kickoff:true,criterion:tl.kickoffCriterion},

    {date:tl.dates[3],x:'75%',c:'var(--p4)',bg:'var(--p4bg)',glow:'rgba(245,158,11,.30)',period:2},
    {date:tl.dates[4],x:'100%',c:'var(--p5)',bg:'var(--p5bg)',glow:'rgba(239,68,68,.30)',period:3}

function buildFlowmap(lastDone){
  const fm = document.getElementById('flowmap');
  fm.innerHTML = '';
  STAGES.forEach(s=>{
    const col = PHASE_COLOR[phaseKey(s)] || {c:'var(--brand)',c2:'var(--brand)',glow:'rgba(37,99,235,.3)'};
    const members = MEMBERS_BY_PREFIX[s.prefix] || [];
    const ready = docAvailable(s);
    const nextup = !ready && STAGES.filter(docAvailable).length === STAGES.indexOf(s); // 第一个未写的
    const node = document.createElement('div');
    node.className = 'flow-node ' + (ready?'ready':'locked') + (nextup?' nextup':'');
    node.dataset.prefix = s.prefix;
    const dftPoint = (DFT_TOPIC?.touchpoints || []).find(p=>p.prefix===s.prefix);
    if(dftPoint){ node.classList.add('dft-involved'); node.dataset.dftKind=dftPoint.kind; }
    node.style.cssText = `--accent:${col.c};--accent2:${col.c2};--accentBg:${col.bg||'var(--brand-soft)'};--glow:${col.glow}`;
    const memberId = `flow-members-${s.prefix}`;
    const descId = `flow-desc-${s.prefix}`;
    const dftRole=dftPoint?`<div class="dft-node-role">DFT · ${esc(localField(dftPoint,'role'))}</div>`:'';
    const describedBy = members.length ? `${memberId} ${descId}` : descId;
    const memberHtml = members.length ? `
      <div class="node-members" id="${memberId}" role="tooltip">
        <div class="ot">${esc(L().groupMembers)}</div>
        <div class="member-list">${members.map(name=>`<span class="member-tag${name==='待定'?' pending':''}"${memberLangAttr(name)}>${esc(displayMember(name))}</span>`).join('')}</div>
      </div>` : '';
    node.innerHTML = `
      ${memberHtml}
      ${ready
        ? `<button class="node-dot" type="button" aria-label="${esc(L().enterStage)} ${s.num} ${esc(stageTitle(s))}" aria-describedby="${describedBy}">${s.num}</button>`
        : `<div class="node-dot" aria-hidden="true">${s.num}</div>`}
      <div class="node-label">${esc(stageTitle(s))}</div>
      <div class="node-pop" id="${descId}" role="tooltip"><div class="pt">${s.num} ${esc(stageTitle(s))}</div><div class="pd">${esc(stageSummary(s))}</div>${dftRole}</div>`;
    if(ready) node.querySelector('.node-dot').onclick = ()=> location.hash='#/'+s.prefix;
    fm.appendChild(node);
  });
  // 连接线:覆盖首~尾节点中心;完成段用渐变流动
  const n = STAGES.length;
  const center = i => (i+0.5)/n*100;
  const track = document.createElement('div');
  track.className = 'flow-track';
  track.style.left = center(0)+'%';
  track.style.width = (center(n-1)-center(0))+'%';
  fm.appendChild(track);
  if(lastDone>0){
    const fill = document.createElement('div');
    fill.className = 'flow-fill';
    fill.style.left = center(0)+'%';
    fill.style.width = '0%';
    fm.appendChild(fill);
    requestAnimationFrame(()=>{ fill.style.transition='width 1s ease .2s'; fill.style.width=(center(lastDone)-center(0))+'%'; });
  }
  buildDftMap(fm);
}

function buildDftMap(fm){
  if(!DFT_TOPIC || STAGES.length<2) return;
  const n = STAGES.length;
  const center = i => (i+0.5)/n*100;
  const indexOf = prefix => STAGES.findIndex(s=>s.prefix===prefix);
  const points = (DFT_TOPIC.touchpoints || []).map(p=>{
    const index=indexOf(p.prefix);
    return {...p,index,stage:STAGES[index]};
  }).filter(p=>p.index>=0 && p.stage);
  if(!points.length) return;

  const map=document.createElement('div');
  map.className='dft-map';
  map.setAttribute('role','group');
  map.setAttribute('aria-label',L().dftScopeAria);

  const spanStart=indexOf(DFT_TOPIC.spanStart);
  const scope=document.createElement('span');
  scope.className='dft-scope-frame';
  scope.innerHTML=`<span style="left:calc(${Math.max(0,spanStart)/n*100}% + 10px)">${esc(L().dftScope)}</span>`;
  map.appendChild(scope);

  const addTrack=(cls,startPrefix,endPrefix)=>{
    const a=indexOf(startPrefix), b=indexOf(endPrefix);
    if(a<0||b<0) return;
    const line=document.createElement('span');
    line.className='dft-track '+cls;
    line.style.left=center(Math.min(a,b))+'%';
    line.style.width=Math.abs(center(b)-center(a))+'%';
    map.appendChild(line);
  };
  addTrack('base',DFT_TOPIC.spanStart,DFT_TOPIC.spanEnd);
  addTrack('segment plan','03','05');
  addTrack('segment focus','07','09');
  addTrack('segment silicon','12','13');

  const focusA=indexOf(DFT_TOPIC.focusStart), focusB=indexOf(DFT_TOPIC.focusEnd);
  if(focusA>=0&&focusB>=0){
    const lo=Math.min(focusA,focusB), hi=Math.max(focusA,focusB);
    const win=document.createElement('span');
    win.className='dft-focus-window';
    win.style.left=(lo/n*100)+'%';
    win.style.width=((hi-lo+1)/n*100)+'%';
    win.innerHTML=`<span>${STAGES[lo].num}–${STAGES[hi].num} · ${esc(localField(DFT_TOPIC,'focusLabel') || L().dftFocusFallback)}</span>`;
    map.appendChild(win);

    const ate=indexOf('12');
    if(ate>=0){
      const note=document.createElement('span');
      note.className='dft-transit-note';
      const left=(hi+1)/n*100, right=center(ate);
      note.style.left=left+'%'; note.style.width=Math.max(0,right-left)+'%';
      note.innerHTML=`<span>${esc(L().dftTransit)}</span>`;
      map.appendChild(note);
    }
  }

  const entryWrap=document.createElement('div');
  entryWrap.className='dft-entry-wrap';
  const members=DFT_TOPIC.members || [];
  const memberHtml=members.map(name=>`<span class="member-tag${name==='待定'?' pending':''}"${memberLangAttr(name)}>${esc(displayMember(name))}</span>`).join('');
  const dftAvailable=docAvailable(DFT_TOPIC);
  entryWrap.innerHTML=`
    <div class="dft-entry-tip dft-entry-members" id="dft-entry-members" role="tooltip">
      <div class="ot">${esc(L().groupMembers)}</div><div class="member-list">${memberHtml}</div>
    </div>
    <${dftAvailable?'a':'div'} class="dft-entry${dftAvailable?'':' disabled'}"
      ${dftAvailable?`href="#/${DFT_TOPIC.prefix}"`:'aria-disabled="true"'}
      aria-label="${esc(L().enterDft)}" aria-describedby="dft-entry-members dft-entry-summary">
      <span class="de-kicker">${esc(L().dftKicker)}</span><b>${esc(stageTitle(DFT_TOPIC))}</b>
      <span class="de-legend">${esc(L().dftLinkage)}</span><span class="de-go">${esc(L().viewMethod)}</span>
    </${dftAvailable?'a':'div'}>
    <div class="dft-entry-tip dft-entry-summary" id="dft-entry-summary" role="tooltip">
      <div class="pt">${esc(stageTitle(DFT_TOPIC))}</div><div class="pd">${esc(stageSummary(DFT_TOPIC))}</div>
    </div>`;
  const entry=entryWrap.querySelector('.dft-entry');
  map.appendChild(entryWrap);

  points.forEach(p=>{
    const tp=document.createElement('div');
    tp.className='dft-touchpoint '+(p.kind||'plan');
    tp.style.gridColumn=String(p.index+1);
    tp.dataset.prefix=p.prefix;
    const tpLabel=localField(p,'label')||stageTitle(p.stage);
    const tpRole=localField(p,'role');
    tp.title=`${p.stage.num} ${stageTitle(p.stage)}: ${tpRole}`;
    tp.innerHTML=`<span class="dft-anchor" aria-hidden="true"></span><span class="dft-tp-label">
      <b>${p.stage.num} ${esc(tpLabel)}</b><small>${esc(tpRole)}</small></span>`;
    map.appendChild(tp);

    const node=fm.querySelector(`.flow-node[data-prefix="${p.prefix}"]`);
    if(node){
      const setActive=on=>{ tp.classList.toggle('is-active',on); node.classList.toggle('dft-hovered',on); };
      tp.addEventListener('mouseenter',()=>setActive(true));
      tp.addEventListener('mouseleave',()=>setActive(false));
      node.addEventListener('mouseenter',()=>tp.classList.add('is-active'));
      node.addEventListener('mouseleave',()=>tp.classList.remove('is-active'));
      node.addEventListener('focusin',()=>tp.classList.add('is-active'));
      node.addEventListener('focusout',()=>tp.classList.remove('is-active'));
    }
  });

  const setAll=on=>points.forEach(p=>fm.querySelector(`.flow-node[data-prefix="${p.prefix}"]`)?.classList.toggle('dft-hovered',on));
  entryWrap.addEventListener('mouseenter',()=>setAll(true));
  entryWrap.addEventListener('mouseleave',()=>setAll(false));
  entryWrap.addEventListener('focusin',()=>setAll(true));
  entryWrap.addEventListener('focusout',()=>setAll(false));
  fm.appendChild(map);
}

function animateCount(el, to, dur){
  const start = performance.now();
  function tick(now){
    const p = Math.min((now-start)/dur, 1);
    el.textContent = Math.round(p*to);
    if(p<1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

document.addEventListener('keydown', e=>{
  if(e.target.closest?.('input,textarea,button,a,select,[contenteditable="true"]')) return;
  if(!currentPrefix) return;
  if(e.key==='Escape'){ location.hash='#/overview'; return; }
  const avail = STAGES.filter(docAvailable);
  const i = avail.findIndex(s=>s.prefix===currentPrefix);
  // DFT设计涉及多个主流程环节,不在十三个编号主阶段的左右键序列中。
  if(i<0) return;
  if(e.key==='ArrowRight' && i<avail.length-1){ location.hash='#/'+avail[i+1].prefix; }
  else if(e.key==='ArrowLeft' && i>0){ location.hash='#/'+avail[i-1].prefix; }
});

  if(/核心内容|内容|core content|core activities/i.test(t)) return '🧩';
  if(/权衡|心态|标尺|张力|铁三角|trade-?offs?|balancing/i.test(t)) return '⚖️';
  if(/方法|工具|怎么做|如何|methods?|tools?|how to/i.test(t)) return '🛠️';
  if(/交付|产出|deliverables?|outputs?/i.test(t)) return '📦';
  if(/忽视|坑|致命|陷阱|误区|pitfalls?|failure|mistakes?|traps?/i.test(t)) return '⚠️';

  return '▸';

async function copyText(text){
  if(navigator.clipboard?.writeText){
    try{ await navigator.clipboard.writeText(text); return true; }
    catch(_){ /* file:// may expose the API but deny permission; use the local fallback below */ }
  }
  try{
    const ta=document.createElement('textarea');
    ta.value=text; ta.setAttribute('readonly',''); ta.style.cssText='position:fixed;left:-9999px;top:0;opacity:0';
    document.body.appendChild(ta); ta.select();
    const ok=typeof document.execCommand==='function'&&document.execCommand('copy');
    ta.remove(); return !!ok;
  }catch(_){ return false; }
}
function decorateDoc(container, stage){
  const col=PHASE_COLOR[phaseKey(stage)]||{c:'var(--brand)',c2:'var(--brand)',bg:'var(--brand-soft)',glow:'rgba(37,99,235,.3)'};
  container.style.setProperty('--accent',col.c);
  container.style.setProperty('--accent2',col.c2);
  container.style.setProperty('--accentBg',col.bg);
  container.style.setProperty('--glow',col.glow);
  const h1 = container.querySelector('h1'); if(h1) h1.remove();
  container.querySelectorAll('blockquote').forEach(bq=>{
    if(/学习系列|全流程:|learning series|end-to-end flow:/i.test(bq.textContent)) bq.classList.add('series-nav');
  });
  container.querySelectorAll('h2,h3').forEach(h=>{
    h.dataset.title = h.textContent;
    const chip=document.createElement('span');
    chip.className='sec-chip'; chip.textContent=docIcon(h.textContent);
    h.insertBefore(chip, h.firstChild);
  });
  container.querySelectorAll('pre').forEach(pre=>{
    const code=pre.textContent||'';
    if(/[→←↑↓│└├┌┐┘─➜▸]/.test(code)){ pre.classList.add('diagram'); pre.dataset.label=L().flowDiagram; }
    const btn=document.createElement('button');
    btn.className='copy-btn'; btn.textContent=L().copy;
    btn.onclick=async()=>{
      btn.textContent=(await copyText(code))?L().copied:L().copyFailed;
      setTimeout(()=>btn.textContent=L().copy,1400);
    };
    pre.appendChild(btn);
  });
  sectionize(container);
  try{ injectSecMap(container, stage); }catch(err){ console.warn('injectSecMap failed', err); }
  try{ injectCases(container, stage); }catch(err){ console.warn('injectCases failed', err); }
  container.insertBefore(buildDocHero(stage), container.firstChild);
}

/* ---------- 「核心内容」小节全景顺序图 ---------- */
function injectSecMap(container, stage){
  const maps=currentLang==='en'?window.SECMAP_EN:window.SECMAP;
  const map = maps && maps[stage.prefix];
  if(!map) return;
  const sections = container.querySelectorAll('.doc-section');
  for(const sec of sections){
    const h2 = sec.querySelector('h2');
    if(!h2) continue;
    if(/^3\.\s/.test(h2.dataset.title || h2.textContent)){
      const el = renderSecMap(map);
      if(h2.nextSibling) sec.insertBefore(el, h2.nextSibling); else sec.appendChild(el);
      break;
    }
  }
}
function renderSecMap(map){
  const wrap=document.createElement('div'); wrap.className='secmap';
  let html=`<div class="secmap-hd">🗺️ ${esc(L().chapterMap)}</div><div class="secmap-note">${esc(map.note)}</div>`;
  html+=`<div class="secmap-flow">`;
  (map.flow||map.cols).forEach((col,ci)=>{
    if(ci>0) html+=`<div class="smarrow">→</div>`;
    html+=`<div class="smcol"><div class="smcol-lbl">${esc(col.lbl)}</div>`;
    col.items.forEach(it=>{ html+=`<button type="button" class="smchip" data-sec="${esc(it[0])}"><b>${esc(it[0])}</b>${esc(it[1])}</button>`; });
    html+=`</div>`;
  });
  html+=`</div>`;
  if(map.span){
    html+=`<div class="secmap-span" data-caption="${esc(L().spanCaption)}"><div class="span-lbl">⇕ ${esc(map.span.lbl)}</div><div class="span-items">`;
    map.span.items.forEach(it=>{ html+=`<button type="button" class="smchip" data-sec="${esc(it[0])}"><b>${esc(it[0])}</b>${esc(it[1])}</button>`; });
    html+=`</div></div>`;
  }
  wrap.innerHTML=html;
  wrap.querySelectorAll('.smchip').forEach(c=> c.onclick=()=>scrollToSec(c.getAttribute('data-sec')));
  return wrap;
}
function scrollToSec(num){
  const hs=document.querySelectorAll('.doc-section h3');
  for(const h of hs){ const t=h.dataset.title||h.textContent; if(t.indexOf(num+' ')===0){ h.scrollIntoView({behavior:'smooth',block:'start'}); return; } }
}

/* ---------- 真实芯片案例(TPU)注入与渲染 ---------- */
function caseBundlesAligned(){
  const zh=window.CASES, en=window.CASES_EN;
  if(!zh||!en) return false;
  const sameKeys=(a,b)=>{
    const ak=Object.keys(a||{}).sort(), bk=Object.keys(b||{}).sort();
    return ak.length===bk.length&&ak.every((key,i)=>key===bk[i]);
  };
  return sameKeys(zh,en)&&Object.keys(zh).every(doc=>sameKeys(zh[doc],en[doc]));
}
function injectCases(container, stage){
  const zhMap=(window.CASES&&window.CASES[stage.prefix])||null;
  const map=currentLang==='en'?(caseBundlesAligned()?window.CASES_EN[stage.prefix]||null:null):zhMap;
  if(!map&&currentLang==='en'&&zhMap){
    const note=document.createElement('aside');
    note.className='case-lang-note';
    note.innerHTML=`<strong class="case-note-title">${esc(L().caseNoteTitle)}</strong><p>${esc(L().caseNote)}</p><button type="button">${esc(L().caseNoteButton)}</button>`;
    note.querySelector('button').onclick=()=>setLanguage('zh');
    const target=Array.from(container.querySelectorAll('.doc-section')).find(sec=>/^3\.\s/.test(sec.querySelector('h2')?.dataset.title||''));
    if(target){ const h2=target.querySelector('h2'); h2.insertAdjacentElement('afterend',note); }
    else container.appendChild(note);
    return;
  }
  if(!map) return;
  container.querySelectorAll('.doc-section h3').forEach(h=>{
    const m = (h.dataset.title || h.textContent).match(/^(\d+\.\d+)/);
    if(!m) return;
    const spec = map[m[1]];
    if(!spec) return;
    const section = h.closest('.doc-section');
    let node = h.nextElementSibling;
    while(node && node.tagName !== 'H3'){ node = node.nextElementSibling; }
    const el = renderCase(spec);
    if(node) section.insertBefore(el, node); else section.appendChild(el);
  });
}
function caseBtn(t){ const b=document.createElement('button'); b.className='case-btn'; b.textContent=t; return b; }
function estimateSvgTextWidth(value,fontSize){
  return Array.from(value).reduce((sum,ch)=>{
    if(/\s/.test(ch)) return sum+fontSize*.31;
    if(/[MW@%#&]/.test(ch)) return sum+fontSize*.82;
    if(/[A-Z0-9]/.test(ch)) return sum+fontSize*.61;
    if(/[ilI1|.,:;'`]/.test(ch)) return sum+fontSize*.28;
    if(/[()\[\]{}\/\\+\-=<>]/.test(ch)) return sum+fontSize*.42;
    return sum+fontSize*.52;
  },0);
}
function wrapSvgWords(value,maxWidth,fontSize){
  const words=value.trim().split(/\s+/), lines=[];
  let line='';
  const pushLongWord=word=>{
    let part='';
    Array.from(word).forEach(ch=>{
      const next=part+ch;
      if(part&&estimateSvgTextWidth(next,fontSize)>maxWidth){ lines.push(part); part=ch; }
      else part=next;
    });
    return part;
  };
  words.forEach(word=>{
    if(!line){ line=estimateSvgTextWidth(word,fontSize)>maxWidth?pushLongWord(word):word; return; }
    const next=line?line+' '+word:word;
    if(estimateSvgTextWidth(next,fontSize)<=maxWidth){ line=next; return; }
    lines.push(line);
    line=estimateSvgTextWidth(word,fontSize)>maxWidth?pushLongWord(word):word;
  });
  if(line) lines.push(line);
  return lines.length?lines:[''];
}
function addSvgTooltip(node,label){
  const title=document.createElementNS('http://www.w3.org/2000/svg','title');
  title.textContent=label;
  node.appendChild(title);
}
function prepareEnglishCaseSvg(fig){
  if(currentLang!=='en') return;
  const svg=fig.querySelector('.cs-svg');
  if(!svg) return;
  const vb=(svg.getAttribute('viewBox')||'0 0 720 420').trim().split(/\s+/).map(Number);
  const left=Number.isFinite(vb[0])?vb[0]:0, top=Number.isFinite(vb[1])?vb[1]:0;
  const width=Number.isFinite(vb[2])?vb[2]:720, originalHeight=Number.isFinite(vb[3])?vb[3]:420;
  const right=left+width, margin=24, noteFont=8.8, lineHeight=11.4;
  let requiredBottom=top+originalHeight;

  // English disclosure notes are often substantially longer than their Chinese
  // counterparts. SVG <text> never wraps by itself, so build explicit tspans and
  // enlarge the viewBox when a bottom note needs additional vertical room.
  svg.querySelectorAll('text.cs-note').forEach(node=>{
    const label=(node.textContent||'').replace(/\s+/g,' ').trim();
    if(!label) return;
    const x=parseFloat(node.getAttribute('x'))||0, y=parseFloat(node.getAttribute('y'))||0;
    const anchor=node.getAttribute('text-anchor')||'start';
    let available=right-margin-x;
    if(anchor==='middle') available=2*Math.min(x-(left+margin),right-margin-x);
    else if(anchor==='end') available=x-(left+margin);
    available=Math.max(80,available);
    const lines=wrapSvgWords(label,available,noteFont);
    requiredBottom=Math.max(requiredBottom,y+(lines.length-1)*lineHeight+14);
    if(lines.length===1) return;
    node.textContent='';
    lines.forEach((line,i)=>{
      const span=document.createElementNS('http://www.w3.org/2000/svg','tspan');
      span.setAttribute('x',String(x));
      span.setAttribute('y',String(y+i*lineHeight));
      span.textContent=line;
      node.appendChild(span);
    });
    addSvgTooltip(node,label);
  });

  // Keep compact labels inside their own boxes. We first reduce the font, then
  // use SVG's textLength only for the rare label that still exceeds the box.
  const labelStyle={
    'cs-t':{size:11,min:6.5},
    'cs-sub':{size:8.8,min:6.1},
    'cs-cellt':{size:10,min:6.3}
  };
  svg.querySelectorAll('text.cs-t,text.cs-sub,text.cs-cellt').forEach(node=>{
    if(node.hasAttribute('transform')) return;
    const kind=Object.keys(labelStyle).find(name=>node.classList.contains(name));
    const style=labelStyle[kind], label=(node.textContent||'').replace(/\s+/g,' ').trim();
    const x=parseFloat(node.getAttribute('x')), y=parseFloat(node.getAttribute('y'));
    if(!style||!label||!Number.isFinite(x)||!Number.isFinite(y)) return;
    const rect=Array.from(node.parentElement?.children||[]).find(el=>{
      if(el.tagName.toLowerCase()!=='rect') return false;
      const rx=parseFloat(el.getAttribute('x'))||0, ry=parseFloat(el.getAttribute('y'))||0;
      const rw=parseFloat(el.getAttribute('width'))||0, rh=parseFloat(el.getAttribute('height'))||0;
      return x>=rx&&x<=rx+rw&&y>=ry&&y<=ry+rh;
    });
    if(!rect) return;
    const available=Math.max(24,(parseFloat(rect.getAttribute('width'))||0)-12);
    const measured=estimateSvgTextWidth(label,style.size);
    if(measured<=available) return;
    const fitted=Math.max(style.min,style.size*available/measured);
    node.style.fontSize=fitted.toFixed(2)+'px';
    if(estimateSvgTextWidth(label,fitted)>available){
      node.setAttribute('textLength',available.toFixed(1));
      node.setAttribute('lengthAdjust','spacingAndGlyphs');
    }
    addSvgTooltip(node,label);
  });
  if(requiredBottom>top+originalHeight){
    svg.setAttribute('viewBox',`${left} ${top} ${width} ${Math.ceil(requiredBottom-top)}`);
  }
}
function renderCase(spec){
  const el=document.createElement('div'); el.className='case';
  const stateKey=`${currentPrefix||'case'}:${spec.secNum}`;
  const uiState=caseUiState.get(stateKey)||{};
  caseUiState.set(stateKey,uiState);
  const hd=document.createElement('div'); hd.className='case-hd';
  hd.innerHTML=`<span class="case-badge">${esc(L().caseBadge)} · ${esc(spec.chip)}</span><span class="case-ttl">${esc(spec.title)}</span>`+
    (spec.oneLine?`<span class="case-one">${spec.oneLine}</span>`:'');
  el.appendChild(hd);
  const bd=document.createElement('div'); bd.className='case-bd'; el.appendChild(bd);

  const fig=document.createElement('div'); fig.className='case-figure'; fig.innerHTML=spec.svg; bd.appendChild(fig);
  prepareEnglishCaseSvg(fig);
  const parts=()=>fig.querySelectorAll('.cs-part');
  const isHl=(p,keys)=>{ const k=p.getAttribute('data-k'), g=p.getAttribute('data-g');
    return (k&&keys.indexOf(k)>=0)||(g&&keys.indexOf(g)>=0); };
  function apply(keys){
    const ps=Array.from(parts());
    ps.forEach(p=>p.classList.remove('is-hl','is-dim'));
    if(!keys||!keys.length) return;
    ps.forEach(p=>{
      if(isHl(p,keys)){ p.classList.add('is-hl'); return; }
      // 容器里若含被高亮的子部件,则容器保持中性(不变暗),否则高亮子件会被父级的低透明度连累
      const hasHlChild=Array.from(p.querySelectorAll('.cs-part')).some(c=>isHl(c,keys));
      if(!hasHlChild) p.classList.add('is-dim');
    });
  }
  let stepIdx=Number.isInteger(uiState.step)?uiState.step:0, timer=null;
  if(spec.steps && spec.steps.length){
    const bar=document.createElement('div'); bar.className='case-step';
    const prev=caseBtn('◀'), play=caseBtn(L().play), next=caseBtn('▶');
    const cap=document.createElement('div'); cap.className='case-cap';
    function stop(){ if(timer){clearInterval(timer);activeCaseTimers.delete(timer);timer=null;play.textContent=L().play;} }
    function show(i){ stepIdx=(i+spec.steps.length)%spec.steps.length; uiState.step=stepIdx; apply(spec.steps[stepIdx].keys); cap.textContent=spec.steps[stepIdx].cap; }
    prev.onclick=()=>{stop();show(stepIdx-1);};
    next.onclick=()=>{stop();show(stepIdx+1);};
    play.onclick=()=>{ if(timer){stop();return;} play.textContent=L().pause; timer=setInterval(()=>show(stepIdx+1),1800); activeCaseTimers.add(timer); };
    bar.append(prev,play,next,cap); bd.appendChild(bar);
    el._restore=()=>apply(spec.steps[stepIdx].keys);
    show(stepIdx);
  } else { el._restore=()=>apply([]); }

  if(spec.legend && spec.legend.length){
    const lg=document.createElement('div'); lg.className='case-legend';
    const desc=document.createElement('div'); desc.className='case-desc'; desc.textContent=L().legendHelp;
    spec.legend.forEach(it=>{
      const c=document.createElement('button'); c.type='button'; c.className='cs-leg';
      c.innerHTML=`<span class="dot"></span>${it.name}`;
      const highlight=()=>{ apply([it.k]); desc.textContent=it.desc; };
      const restore=()=>{ el._restore(); desc.textContent=L().legendHelp; };
      c.onmouseenter=highlight; c.onfocus=highlight;
      c.onmouseleave=restore; c.onblur=restore;
      lg.appendChild(c);
    });
    bd.appendChild(lg); bd.appendChild(desc);
  }
  // 设计生命周期:设计前 → 设计时 → 设计结果 → 设计后
  const lifeList=items=>`<ul>${items.map(x=>`<li>${x}</li>`).join('')}</ul>`;
  const lifeSpecs=items=>`<div class="case-specs">${items.map(s=>`<div class="spec"><div class="k">${s.label}</div><div class="v">${s.value}</div></div>`).join('')}</div>`;
  const tabs=[
    {t:L().lifeBefore, html:(spec.before&&spec.before.length)?`<div class="life-intro">${esc(L().lifeIntro)}</div>${lifeList(spec.before)}`:''},
    {t:L().lifeDuring, html:(spec.during&&spec.during.length)?lifeList(spec.during):''},
    {t:L().lifeResult, html:(spec.result&&spec.result.length)?lifeSpecs(spec.result):''},
    {t:L().lifeAfter, html:(spec.after&&spec.after.length)?lifeList(spec.after):''}
  ].filter(x=>x.html);
  if(tabs.length){
    const life=document.createElement('div'); life.className='case-life';
    const bar=document.createElement('div'); bar.className='life-tabs';
    const panels=document.createElement('div'); panels.className='life-panels';
    const activeTab=Math.min(Number.isInteger(uiState.tab)?uiState.tab:0,tabs.length-1);
    tabs.forEach((tb,i)=>{
      const b=document.createElement('button'); b.className='life-tab'+(i===activeTab?' active':''); b.textContent=tb.t;
      const p=document.createElement('div'); p.className='life-panel'+(i===activeTab?' active':''); p.innerHTML=tb.html;
      b.onclick=()=>{ bar.querySelectorAll('.life-tab').forEach(x=>x.classList.remove('active'));
        panels.querySelectorAll('.life-panel').forEach(x=>x.classList.remove('active'));
        b.classList.add('active'); p.classList.add('active'); uiState.tab=i; };
      bar.appendChild(b); panels.appendChild(p);
    });
    life.appendChild(bar); life.appendChild(panels); bd.appendChild(life);
  }
  if(spec.source){ const s=document.createElement('div'); s.className='case-src'; s.textContent=L().sourceLabel+spec.source; bd.appendChild(s); }
  return el;
}
function sectionize(container){
  const kids=Array.from(container.childNodes);
  container.innerHTML='';
  let lead=null, cur=null;
  kids.forEach(node=>{
    if(node.nodeType===1 && node.tagName==='H2'){
      cur=document.createElement('section'); cur.className='doc-section reveal';
      if(/忽视|坑|致命|陷阱|误区|pitfalls?|failure|mistakes?|traps?/i.test(node.dataset.title||node.textContent)) cur.classList.add('warn-section');
      container.appendChild(cur); cur.appendChild(node);
    } else if(cur){ cur.appendChild(node); }
    else { if(!lead){ lead=document.createElement('div'); lead.className='doc-lead'; container.appendChild(lead);} lead.appendChild(node); }
  });
}
function buildDocHero(stage){
  const col=PHASE_COLOR[phaseKey(stage)]||{c:'var(--brand)',c2:'var(--brand)',bg:'var(--brand-soft)',glow:'rgba(37,99,235,.3)'};
  const isTopic=TOPICS.includes(stage);
  const idx=STAGES.indexOf(stage)+1;
  const raw=docRaw(stage);
  const mins=currentLang==='en'
    ? Math.max(1,Math.round(((raw.match(/\b[\w’'-]+\b/g)||[]).length)/220))
    : Math.max(1,Math.round(raw.length/450));
  let dots='';
  STAGES.forEach(s=>{
    const c=PHASE_COLOR[phaseKey(s)]||{};
    const isCur=s.prefix===stage.prefix;
    const available=docAvailable(s);
    let cls='dh-step'+(isCur?' cur':(available?' avail':''));
    const bg=isCur?`linear-gradient(90deg,${col.c},${col.c2})`:(available?c.c:'var(--line)');
    const label=`${s.num} ${stageTitle(s)}`;
    dots+=`<button type="button" class="${cls}" style="background:${bg}" title="${esc(label)}" aria-label="${esc(label)}" ${isCur?'aria-current="step" disabled':(available?`onclick="location.hash='#/${s.prefix}'"`:'disabled')}></button>`;
  });
  const hero=document.createElement('div');
  hero.className='doc-hero'+(isTopic?' crosscut':'');
  hero.style.cssText=`--accent:${col.c};--accent2:${col.c2};--accentBg:${col.bg};--glow:${col.glow}`;
  hero.innerHTML=`
    <div class="dh-top">
      <span class="dh-badge">${stage.num}</span>
      <div>
        <div class="dh-phase">${esc(isTopic?L().topicProgress:L().stageProgress(phaseLabel(stage),idx,STAGES.length))}</div>
        <h1 class="dh-title" tabindex="-1">${esc(stageTitle(stage))}</h1>
      </div>
    </div>
    <div class="dh-meta"><span>📖 ${esc(L().readMinutes(mins))}</span><span>${esc(isTopic?L().topicMeta:'🧭 '+phaseLabel(stage))}</span></div>
    <div class="dh-stepper">${dots}</div>`;
  return hero;
}

/* ---------- 路由 ---------- */
function route(shouldFocus=false){
  clearCaseTimers();
  const hash = location.hash || '#/overview';
  const m = hash.match(/^#\/(\w+)/);
  const key = m ? m[1] : 'overview';
  if(key==='overview') renderOverview();
  else if(ALL_DOCS.some(s=>s.prefix===key)) renderDoc(key);
  else { const t=document.getElementById(hash.slice(1)); if(t) t.scrollIntoView({behavior:'smooth'}); else renderOverview(); }
  const active=ALL_DOCS.find(s=>s.prefix===key);
  document.getElementById('routeStatus').textContent=active?`${active.num} ${stageTitle(active)}`:L().overviewTitle;
  if(shouldFocus){
    requestAnimationFrame(()=>document.querySelector('#content h1')?.focus({preventScroll:true}));
  }
}
window.addEventListener('hashchange', ()=>route(true));
applyLanguageShell();
if(!STAGES.length){
  document.getElementById('content').innerHTML =
    `<p style="color:#b3406b">${esc(L().missing)}</p>`;
} else { route(); }
</script>
