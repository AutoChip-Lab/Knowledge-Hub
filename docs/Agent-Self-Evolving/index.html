<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Self-Evolving Agents</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="theme-b.css?v=5" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true"><i data-lucide="flask-conical"></i></div>
          <h1>SELF-EVOLVING AGENTS</h1>
        </div>
        <div class="topbar-actions">
          <button id="prevBtn" class="icon-button" type="button" aria-label="Previous article">
            <span aria-hidden="true">←</span>
          </button>
          <button id="nextBtn" class="icon-button" type="button" aria-label="Next article">
            <span aria-hidden="true">→</span>
          </button>
          <div class="toolbar-divider" aria-hidden="true"></div>
          <div class="progress-wrap" aria-label="Article progress">
            <div id="progressText" class="progress-text"></div>
            <div class="progress-track"><div id="progressBar" class="progress-bar"></div></div>
          </div>
          <div id="languageSwitch" class="language-switch" role="group" aria-label="Language">
            <button type="button" data-language="zh">中文</button>
            <button type="button" data-language="en">EN</button>
          </div>
        </div>
      </header>

      <aside class="rail" aria-label="Article navigation">
        <nav id="timeline" class="timeline" aria-label="Papers timeline"></nav>
      </aside>

      <main class="stage">
        <section id="article" class="article" aria-live="polite"></section>
      </main>
    </div>

    <script>
      window.MathJax = {
        tex: {
          inlineMath: [["\\(", "\\)"]],
          displayMath: [["\\[", "\\]"]]
        },
        svg: { fontCache: "global" },
        options: { skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"] }
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <script defer src="paper-content.js"></script>
    <script defer src="paper-content-zh.js?v=2"></script>
    <script defer src="app.js?v=4"></script>
    <script defer src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script>
      window.addEventListener("DOMContentLoaded", () => window.lucide?.createIcons());
    </script>
  </body>
</html>
