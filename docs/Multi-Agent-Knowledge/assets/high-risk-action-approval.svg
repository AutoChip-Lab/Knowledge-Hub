<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 880" role="img" aria-labelledby="title desc">
  <title id="title">高风险动作审批链</title>
  <desc id="desc">用户请求进入系统后，Agent 生成结构化动作请求。运行时依次执行输入过滤、任务与风险分级、权限控制和执行隔离，再进行策略判定。越权动作被拒绝或升级；低风险且已授权的动作直接受控执行；高风险或有外部副作用的动作先进入人工审批。执行失败时进行回滚或补偿，所有路径都写入审计记录。</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#637993"/>
    </marker>
    <marker id="arrow-danger" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#b85c58"/>
    </marker>
    <style>
      .panel { fill: #f8fbff; stroke: #d5e1ee; stroke-width: 1.8; }
      .request { fill: #eaf8f4; stroke: #2b8b79; stroke-width: 2; }
      .agent { fill: #eef5ff; stroke: #4a78c2; stroke-width: 2; }
      .guard { fill: #f7f3ff; stroke: #8066b3; stroke-width: 2; }
      .gate { fill: #fff8e8; stroke: #d3982f; stroke-width: 2.2; }
      .execute { fill: #eef5ff; stroke: #4a78c2; stroke-width: 2; }
      .human { fill: #eaf8f4; stroke: #2b8b79; stroke-width: 2.2; }
      .danger { fill: #fff0f0; stroke: #b85c58; stroke-width: 2; }
      .recover { fill: #f7f3ff; stroke: #8066b3; stroke-width: 2; }
      .audit { fill: #edf7ff; stroke: #367ba6; stroke-width: 2; }
      .flow { fill: none; stroke: #637993; stroke-width: 2.3; marker-end: url(#arrow); }
      .danger-flow { fill: none; stroke: #b85c58; stroke-width: 2.2; stroke-dasharray: 7 5; marker-end: url(#arrow-danger); }
      .panel-title { fill: #526982; font: 700 19px system-ui, -apple-system, "Segoe UI", sans-serif; }
      .title { fill: #17365d; font: 700 21px system-ui, -apple-system, "Segoe UI", sans-serif; text-anchor: middle; }
      .detail { fill: #526982; font: 16px system-ui, -apple-system, "Segoe UI", sans-serif; text-anchor: middle; }
      .step-title { fill: #2c4767; font: 700 18px system-ui, -apple-system, "Segoe UI", sans-serif; }
      .step-detail { fill: #526982; font: 15px system-ui, -apple-system, "Segoe UI", sans-serif; }
      .num { fill: #8066b3; }
      .num-text { fill: #ffffff; font: 700 15px system-ui, -apple-system, "Segoe UI", sans-serif; text-anchor: middle; dominant-baseline: central; }
      .edge-label { fill: #526982; font: 700 16px system-ui, -apple-system, "Segoe UI", sans-serif; }
      .danger-label { fill: #a6504d; font: 700 16px system-ui, -apple-system, "Segoe UI", sans-serif; }
    </style>
  </defs>

  <rect x="20" y="20" width="405" height="840" rx="22" class="panel"/>
  <text x="45" y="57" class="panel-title">一、请求与执行前自动防线</text>

  <rect x="55" y="82" width="335" height="58" rx="14" class="request"/>
  <text x="222" y="118" class="title">用户请求</text>
  <path d="M222 140 L222 165" class="flow"/>

  <rect x="55" y="165" width="335" height="72" rx="14" class="agent"/>
  <text x="222" y="197" class="title">Agent 生成结构化动作请求</text>
  <text x="222" y="222" class="detail">动作 · 参数 · 目标资源 · 理由</text>
  <path d="M222 237 L222 265" class="flow"/>

  <rect x="45" y="265" width="355" height="416" rx="18" class="guard"/>
  <text x="222" y="301" class="title">执行前自动防线</text>

  <circle cx="77" cy="345" r="17" class="num"/>
  <text x="77" y="345" class="num-text">1</text>
  <text x="108" y="340" class="step-title">输入过滤</text>
  <text x="108" y="365" class="step-detail">敏感数据 · 提示注入 · 越权意图</text>
  <line x1="68" y1="392" x2="377" y2="392" stroke="#d9d2e9"/>

  <circle cx="77" cy="435" r="17" class="num"/>
  <text x="77" y="435" class="num-text">2</text>
  <text x="108" y="430" class="step-title">任务与风险分级</text>
  <text x="108" y="455" class="step-detail">低风险 · 写操作 · 外部影响 · 高风险</text>
  <line x1="68" y1="482" x2="377" y2="482" stroke="#d9d2e9"/>

  <circle cx="77" cy="525" r="17" class="num"/>
  <text x="77" y="525" class="num-text">3</text>
  <text x="108" y="520" class="step-title">权限控制</text>
  <text x="108" y="545" class="step-detail">角色 · 工具 · 资源 · 环境</text>
  <line x1="68" y1="572" x2="377" y2="572" stroke="#d9d2e9"/>

  <circle cx="77" cy="615" r="17" class="num"/>
  <text x="77" y="615" class="num-text">4</text>
  <text x="108" y="610" class="step-title">执行隔离</text>
  <text x="108" y="635" class="step-detail">沙箱 · 路径限制 · 网络限制 · timeout</text>

  <path d="M400 473 L460 473" class="flow"/>
  <polygon points="535,393 610,473 535,553 460,473" class="gate"/>
  <text x="535" y="466" class="title">策略</text>
  <text x="535" y="491" class="title">判定</text>

  <path d="M535 393 L535 102 L705 102" class="danger-flow"/>
  <text x="555" y="128" class="danger-label">越权</text>
  <rect x="705" y="62" width="450" height="80" rx="15" class="danger"/>
  <text x="930" y="94" class="title">拒绝或升级</text>
  <text x="930" y="120" class="detail">记录拒绝原因、升级对象与审计信息</text>

  <path d="M610 473 L770 473 L770 283 L840 283" class="flow"/>
  <text x="625" y="456" class="edge-label">低风险且已授权</text>

  <path d="M535 553 L535 593" class="flow"/>
  <text x="553" y="580" class="edge-label">高风险或有外部副作用</text>
  <rect x="455" y="593" width="320" height="112" rx="16" class="gate"/>
  <text x="615" y="625" class="title">审批门</text>
  <text x="615" y="652" class="detail">删除 · 部署 · 外发消息前</text>
  <text x="615" y="678" class="detail">展示影响并绑定实际参数</text>
  <path d="M615 705 L615 734" class="flow"/>

  <polygon points="615,734 710,786 615,838 520,786" class="human"/>
  <text x="615" y="780" class="title">人类是否</text>
  <text x="615" y="805" class="title">批准？</text>

  <path d="M710 786 L805 786 L805 323 L840 323" class="flow"/>
  <text x="728" y="770" class="edge-label">是</text>
  <path d="M520 786 L448 786" class="danger-flow"/>
  <text x="474" y="771" class="danger-label">否</text>
  <rect x="215" y="744" width="230" height="84" rx="15" class="danger"/>
  <text x="330" y="777" class="title">拒绝动作并停止</text>
  <text x="330" y="805" class="detail">记录审批结果与审计信息</text>

  <rect x="840" y="243" width="315" height="80" rx="15" class="execute"/>
  <text x="998" y="276" class="title">在隔离边界内受控执行</text>
  <text x="998" y="302" class="detail">实际参数必须与审批内容一致</text>
  <path d="M998 323 L998 373" class="flow"/>

  <polygon points="998,373 1110,433 998,493 886,433" class="gate"/>
  <text x="998" y="426" class="title">执行是否</text>
  <text x="998" y="451" class="title">成功？</text>

  <path d="M998 493 L998 548" class="flow"/>
  <text x="1016" y="526" class="danger-label">否</text>
  <rect x="840" y="548" width="315" height="78" rx="15" class="recover"/>
  <text x="998" y="580" class="title">回滚或补偿动作</text>
  <text x="998" y="607" class="detail">恢复状态并记录恢复结果</text>
  <path d="M998 626 L998 680" class="flow"/>

  <path d="M1110 433 L1175 433 L1175 720 L1155 720" class="flow"/>
  <text x="1129" y="417" class="edge-label">是</text>
  <rect x="840" y="680" width="315" height="124" rx="16" class="audit"/>
  <text x="998" y="716" class="title">写入审计日志</text>
  <text x="998" y="744" class="detail">谁 · 何时 · 对什么 · 做了什么 · 结果</text>
  <text x="998" y="771" class="detail">返回结果或终止</text>
</svg>
